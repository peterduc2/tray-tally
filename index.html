<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tray Tally</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--surface:#0c1018;--card:#141c2b;--border:#1e2d44;--accent:#38bdf8;--accentDim:rgba(56,189,248,0.12);--green:#4ade80;--greenDim:rgba(74,222,128,0.15);--red:#fb7185;--redDim:rgba(251,113,133,0.15);--orange:#fbbf24;--orangeDim:rgba(251,191,36,0.12);--purple:#a78bfa;--purpleDim:rgba(167,139,250,0.12);--text:#e4eaf4;--muted:#6e819e;--dim:#3b4a64}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite}
.chip{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;min-height:30px}
.status-bar{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:7px;border:none;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;background:transparent;color:var(--dim);border-bottom:2px solid transparent}
.tab.active{background:var(--card);color:var(--text);border-bottom-color:var(--accent)}
.content{flex:1;overflow:auto}
.table-wrap{padding:6px;overflow:auto}
table{border-collapse:separate;border-spacing:0;font-size:10px;font-family:'IBM Plex Mono',monospace;min-width:100%}
th.big{padding:6px 4px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--muted);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0;z-index:3;white-space:nowrap}
th.sub{padding:4px 3px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--dim);font-weight:600;font-size:8px;text-align:center;position:sticky;top:22px;z-index:3;white-space:nowrap}
td.nm{padding:6px 8px;border-bottom:1px solid rgba(30,45,68,.15);font-weight:700;font-size:11px;font-family:'Outfit';white-space:nowrap;position:sticky;left:0;z-index:2;border-right:1px solid var(--border)}
td.c{padding:5px 6px;border-bottom:1px solid rgba(30,45,68,.12);text-align:center;min-width:28px;font-size:11px}
td.c.hl{background:var(--accentDim);animation:pop .3s}
td.c.hlc{background:var(--orangeDim);animation:pop .3s}
td.c.hll{background:var(--purpleDim);animation:pop .3s}
.log-wrap{padding:10px 14px}
.log-entry{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(30,45,68,.07);font-family:'IBM Plex Mono',monospace}
.log-entry.error{color:var(--red)}.log-entry.success{color:var(--green)}.log-entry.info{color:var(--muted)}
.log-time{opacity:.3;margin-right:6px;font-size:9px}
.bottom{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.transcript{padding:8px 14px;border-bottom:1px solid var(--border);animation:fadeUp .2s}
.transcript p{font-size:14px;font-style:italic;color:var(--muted)}
.confirm-box{padding:10px 14px;border-bottom:1px solid var(--border);text-align:center;animation:fadeUp .3s}
.confirm-val{font-size:20px;font-weight:800}
.confirm-btns{display:flex;gap:10px;margin-top:10px}
.btn-no{flex:1;padding:16px;border-radius:14px;border:2px solid rgba(251,113,133,.27);background:var(--redDim);color:var(--red);font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;min-height:54px}
.btn-yes{flex:1;padding:16px;border-radius:14px;border:2px solid rgba(74,222,128,.27);background:var(--greenDim);color:var(--green);font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;min-height:54px}
.name-picker{padding:10px 14px;border-bottom:1px solid var(--border);animation:fadeUp .3s}
.name-picker-title{margin-bottom:8px;font-size:13px;font-weight:700;color:var(--purple);text-align:center}
.name-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-height:160px;overflow:auto}
.name-btn{padding:9px 13px;border-radius:18px;border:1.5px solid rgba(167,139,250,.27);background:var(--purpleDim);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;min-height:40px}
.cancel-btn{width:100%;margin-top:8px;padding:10px;border-radius:10px;border:1px solid rgba(251,113,133,.2);background:var(--redDim);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.spell-box{padding:10px 14px;border-bottom:1px solid var(--border);animation:fadeUp .3s;text-align:center}
.spell-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:6px}
.spell-letters{font-size:24px;font-weight:800;letter-spacing:4px;color:var(--accent);min-height:36px;margin:8px 0}
.spell-hint{font-size:10px;color:var(--dim)}
.main-btn-wrap{padding:14px 16px 20px;display:flex;justify-content:center}
.btn-copy{width:100%;max-width:340px;padding:22px;border-radius:20px;border:none;background:linear-gradient(145deg,var(--accent),#6366f1);color:#fff;font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 30px rgba(56,189,248,.3);display:flex;align-items:center;justify-content:center;gap:12px}
.btn-done{width:100%;max-width:340px;padding:22px;border-radius:20px;border:2px solid rgba(251,113,133,.27);background:var(--redDim);color:var(--red);font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 30px rgba(251,113,133,.15);display:flex;align-items:center;justify-content:center;gap:12px}
.hint{text-align:center;font-size:10px;color:var(--dim);padding:0 14px 12px}
.sync-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:6px}
.sync-badge.ok{background:rgba(74,222,128,.12);color:var(--green)}
.sync-badge.pending{background:rgba(251,191,36,.12);color:var(--orange)}
.sync-badge.err{background:rgba(251,113,133,.12);color:var(--red)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycby-JkwiebFtp_R9q4oR_wDBygB_do20yrfVdHXbCG8yXtSfyjKPjuuveGSFEDEwjO5RcA/exec";

const NAMES=["David","Mark","Tala","Huong","Paulo","Bob","Dung","Lan","Lien","Hoi","Son","Chien Ito","Hong","Tu","Nghia","Vinh","Kevin","Ninh","Phat","Linh","Dieu","Amy","Thi"];
const NL=NAMES.map(n=>n.toLowerCase());
const MAX_N=15,MAX_C=3,MAX_L=3;
const cC=v=>Math.round(v*14/12),lC=v=>Math.round(v*13/17);

let data={};NAMES.forEach(n=>{data[n]={normal:[],costco:[],lidoff:[]}});
let sessionActive=false,status="idle",pendingCmd=null,transcript="",logs=[],lastHL=null,viewTab="table",rec=null;
let syncStatus="ok";
let spelledName=""; // accumulates letters during spell mode

// ── Google Sheet sync ──
async function sendToSheet(action,params){
  syncStatus="pending";render();
  try{
    const url=new URL(SCRIPT_URL);url.searchParams.set("action",action);
    for(const[k,v]of Object.entries(params))url.searchParams.set(k,v);
    const resp=await fetch(url.toString(),{redirect:"follow"});
    const r=await resp.json();
    syncStatus=r.error?"error":"ok";render();return r;
  }catch(e){syncStatus="error";render();addLog("Sync fail: "+e.message,"error");return{error:e.message}}
}

// ── Numbers ──
const WN={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90,hundred:100};
function w2n(s){const d=parseInt(s);if(!isNaN(d))return d;const ws=s.toLowerCase().replace(/-/g," ").split(/\s+/);let c=0;for(const w of ws){if(WN[w]!==undefined){if(w==="hundred")c=(c||1)*100;else c+=WN[w]}}return c}
function lev(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));return d[m][n]}

// ── Name aliases ──
const NA={
  "david":["david","davit","davide","dav","dave","daveed"],
  "mark":["mark","marc","marks","marke","mock"],
  "tala":["tala","talla","taller","tyler","tela","tayla","tara"],
  "huong":["huong","hong","hung","huang","hwong","hueng","hewong","huon","fuong"],
  "paulo":["paulo","pablo","polo","paul","paula","pow low"],
  "bob":["bob","bop","barb","bobs","rob"],
  "dung":["dung","dong","doong","young","jung","yung"],
  "lan":["lan","lynn","lam","land","lon","lang","len"],
  "lien":["lien","lean","leon","leen","lein","lin","lian"],
  "hoi":["hoi","hoy","hi","hoe","hoey","hey","hoiy"],
  "son":["son","sun","sung","sone","sewn","sohn","zone"],
  "chien ito":["chien ito","chien","chen ito","chen","chicken ito","jean ito","chain ito","sheen ito","cheney toe"],
  "hong":["hong","hung","honk","haung"],
  "tu":["tu","too","two","to","tue","tew"],
  "nghia":["nghia","nia","nea","ngia","niya","near","nee ya","knee ya","knee ah"],
  "vinh":["vinh","vin","veen","vine","ving","vinn","win","winn"],
  "kevin":["kevin","kelvin","gavin","kev"],
  "ninh":["ninh","nin","ning","neen","nine","ninn","nien"],
  "phat":["phat","fat","fatt","pot","pat","fad","part","fut"],
  "linh":["linh","lin","ling","lean","lynn","link","lyn"],
  "dieu":["dieu","dew","due","diu","du","dio","deal","dee you","did you"],
  "amy":["amy","amee","aimee","ami","amie"],
  "thi":["thi","tea","thee","ti","the","tee","fee","tree"]
};

function findName(sp){
  const lo=sp.toLowerCase().trim();
  for(let i=0;i<NAMES.length;i++)if(lo===NL[i])return{name:NAMES[i],conf:100};
  for(const[key,aliases]of Object.entries(NA)){const rn=NAMES.find(n=>n.toLowerCase()===key);if(!rn)continue;for(const a of aliases)if(lo===a||lo.includes(a))return{name:rn,conf:96}}
  const sorted=[...NAMES].sort((a,b)=>b.length-a.length);
  for(const n of sorted)if(lo.includes(n.toLowerCase()))return{name:n,conf:95};
  let bs=Infinity,bi=0;
  for(let i=0;i<NAMES.length;i++){const aliases=NA[NL[i]]||[NL[i]];for(const a of aliases){const d=lev(lo,a);if(d<bs){bs=d;bi=i}}}
  const ml=Math.max(lo.length,NL[bi].length||1);
  return{name:NAMES[bi],conf:Math.round((1-bs/ml)*100)}
}

// ── Type detection ──
// "rock", "pacific" = normal. "costco" variants. "lidoff" variants.
const NORMAL_W=["rock","rocks","rok","roc","pacific","pacifica","specific","pasific"];
const COSTCO_W=["costco","cosco","cost co","cos co","cosko","costko","casco","costcow","koscoe","costico","custom","costgo","cisco","costcoe","corso","kosco"];
const LIDOFF_W=["lid off","lidoff","lit off","lit of","lid of","lead off","lead-off","led off","led of","lid on","lit on","lied off","light off","light of","lid up","lid all","live off","lift off","lip off","lip of","lid oh","little off","little of","later off","lit up"];

function detectType(text){
  const lo=text.toLowerCase();
  for(const w of COSTCO_W)if(lo.includes(w))return{type:"costco",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  const sl=[...LIDOFF_W].sort((a,b)=>b.length-a.length);
  for(const w of sl)if(lo.includes(w))return{type:"lidoff",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  // Normal keywords — remove them but keep type normal
  for(const w of NORMAL_W)if(lo.includes(w))return{type:"normal",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  return{type:"normal",cleaned:lo}
}

function parseCmd(text){
  const{type,cleaned}=detectType(text);
  let cl=cleaned.replace(/\bfor\b/g,"").trim();
  let numStr="",rest=cl;
  const nm=cl.match(/^(\d+)\s*(.*)/);
  if(nm){numStr=nm[1];rest=nm[2].trim()}
  else{const ws=cl.split(/\s+/);let nw=[],i=0;while(i<ws.length&&WN[ws[i]]!==undefined){nw.push(ws[i]);i++}if(nw.length){numStr=nw.join(" ");rest=ws.slice(i).join(" ").trim()}}
  if(!numStr||!rest)return null;
  const value=w2n(numStr);
  if(value===0&&!numStr.includes("0")&&!numStr.includes("zero"))return null;
  const{name,conf}=findName(rest);
  return{type,value,name,nameConfidence:conf}
}

// ── Spell matching: "D-A-V-I-D" → "David" ──
function matchSpelling(spelled){
  const lo=spelled.toLowerCase().replace(/[^a-z]/g,"");
  if(!lo)return null;
  // Exact match
  for(let i=0;i<NAMES.length;i++){
    if(NL[i].replace(/\s/g,"")===lo)return NAMES[i];
  }
  // Starts with
  for(let i=0;i<NAMES.length;i++){
    if(NL[i].replace(/\s/g,"").startsWith(lo)&&lo.length>=2)return NAMES[i];
  }
  // Fuzzy
  let bs=Infinity,bi=0;
  for(let i=0;i<NAMES.length;i++){const d=lev(lo,NL[i].replace(/\s/g,""));if(d<bs){bs=d;bi=i}}
  if(bs<=2)return NAMES[bi];
  return null;
}

// ── Extract letters from speech like "D A V I D" or "D-A-V-I-D" or "david" ──
function extractLetters(text){
  const lo=text.toLowerCase().trim();
  // If it sounds like individual letters: "d a v i d" or "d. a. v. i. d."
  const letterPattern=lo.replace(/[\s.,\-]+/g,"");
  return letterPattern;
}

function speak(text){return new Promise(r=>{speechSynthesis.cancel();setTimeout(()=>{const u=new SpeechSynthesisUtterance(text);u.rate=1.05;u.lang="en-US";u.onend=()=>setTimeout(r,200);u.onerror=()=>setTimeout(r,200);speechSynthesis.speak(u)},100)})}

function addLog(msg,type="info"){logs.push({msg,type,t:new Date()});if(logs.length>50)logs=logs.slice(-50);render()}
function totalFor(p){return p.normal.reduce((a,b)=>a+b,0)+p.costco.reduce((a,b)=>a+cC(b),0)+p.lidoff.reduce((a,b)=>a+lC(b),0)}

// ── Mic ──
function startListening(){
  if(!sessionActive)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addLog("Use Safari!","error");return}
  try{rec?.abort()}catch{}
  rec=new SR();rec.continuous=false;rec.interimResults=true;rec.lang="en-US";
  rec.onstart=()=>{};
  rec.onresult=(e)=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join("");
    transcript=t;render();
    if(e.results[0]?.isFinal){addLog('🗣 "'+t.trim()+'"',"info");handleSpeech(t.trim())}
  };
  rec.onerror=(e)=>{if(e.error!=="no-speech"&&e.error!=="aborted"){addLog("Mic: "+e.error,"error");if(e.error==="not-allowed"){sessionActive=false;status="idle";render()}}};
  rec.onend=()=>{if(sessionActive&&status!=="namePick")setTimeout(()=>{if(sessionActive)startListening()},300)};
  try{rec.start()}catch(e){addLog("Mic fail: "+e.message,"error")}
}

// ── Main speech handler ──
async function handleSpeech(text){
  if(!text)return;
  const lo=text.toLowerCase().trim();

  // ── CONFIRM mode ──
  if(status==="confirm"){
    if(lo.includes("confirm")||lo.includes("yes")||lo.includes("correct")||lo==="ok"||lo==="yep"||lo==="yeah"||lo==="yup"||lo==="sure"){doConfirm();return}
    if(lo.includes("no")||lo.includes("wrong")||lo.includes("cancel")||lo.includes("nope")||lo.includes("nah")){doDeny();return}
    addLog('Heard "'+text+'" — say Yes or No',"error");await speak("Yes or no.");return;
  }

  // ── SPELL mode: user is spelling the name ──
  if(status==="spell"){
    const letters=extractLetters(text);
    if(lo==="cancel"||lo==="stop"){cancelSpell();return}
    if(lo==="done"||lo==="ok"||lo==="that's it"||lo==="finish"){
      const matched=matchSpelling(spelledName);
      if(matched){
        pendingCmd.name=matched;pendingCmd.nameConfidence=100;
        status="confirm";spelledName="";render();
        const lb=pendingCmd.type==="costco"?" costco":pendingCmd.type==="lidoff"?" lid off":"";
        addLog("Spelled: "+matched,"info");
        await speak(pendingCmd.value+lb+" "+matched+". Yes?");
      }else{
        addLog("No match for: "+spelledName,"error");
        await speak("No match. Try again or tap the name.");
        status="namePick";render();
      }
      return;
    }
    // Accumulate letters
    spelledName+=letters;
    addLog("Spelling: "+spelledName.toUpperCase(),"info");
    // Check if we have a match already
    const matched=matchSpelling(spelledName);
    if(matched){
      await speak(spelledName.toUpperCase().split("").join(". ")+". Is that "+matched+"?");
      render();
    }else{
      await speak(spelledName.toUpperCase().split("").join(". ")+". Continue or say done.");
      render();
    }
    return;
  }

  // ── NORMAL command mode ──
  const result=parseCmd(text);
  if(!result){addLog('Could not parse: "'+text+'"',"error");await speak("Didn't catch that.");return}

  if(result.nameConfidence<90){
    pendingCmd=result;
    spelledName="";
    status="spell";render();
    addLog("Name uncertain: "+result.name+" ("+result.nameConfidence+"%)","error");
    await speak("Not sure about the name. Please spell it, or tap the name below.");
    // Also show name picker as backup
    return;
  }

  pendingCmd=result;status="confirm";render();
  const lb=result.type==="costco"?" costco":result.type==="lidoff"?" lid off":"";
  addLog("→ "+result.value+lb+" "+result.name,"info");
  await speak(result.value+lb+" "+result.name+". Yes?");
}

async function doConfirm(){
  if(!pendingCmd)return;
  const cmd=pendingCmd;
  applyLocal(cmd);pendingCmd=null;status="listening";render();
  addLog("Confirmed ✓","success");await speak("Done.");
  sendToSheet("add",{name:cmd.name,value:cmd.value,type:cmd.type});
}
async function doDeny(){pendingCmd=null;status="listening";render();addLog("Cancelled","info");await speak("Cancelled.")}

function applyLocal(cmd){
  const p=data[cmd.name];if(!p)return;
  if(cmd.type==="normal"){if(p.normal.length>=MAX_N)return;p.normal.push(cmd.value);lastHL={name:cmd.name,sec:"normal",idx:p.normal.length-1}}
  else if(cmd.type==="costco"){if(p.costco.length>=MAX_C)return;p.costco.push(cmd.value);lastHL={name:cmd.name,sec:"costco",idx:p.costco.length-1}}
  else if(cmd.type==="lidoff"){if(p.lidoff.length>=MAX_L)return;p.lidoff.push(cmd.value);lastHL={name:cmd.name,sec:"lidoff",idx:p.lidoff.length-1}}
  render();setTimeout(()=>{lastHL=null;render()},2500);
}

async function startSession(){sessionActive=true;status="listening";addLog("Session started","success");render();await speak("Ready.");startListening()}
async function endSession(){sessionActive=false;try{rec?.abort()}catch{}status="idle";pendingCmd=null;transcript="";spelledName="";addLog("Session ended","info");render();await speak("Done.")}

function pickName(name){
  if(!pendingCmd)return;
  pendingCmd.name=name;pendingCmd.nameConfidence=100;
  status="confirm";spelledName="";render();
  const lb=pendingCmd.type==="costco"?" costco":pendingCmd.type==="lidoff"?" lid off":"";
  addLog("Selected: "+name,"info");
  speak(pendingCmd.value+lb+" "+name+". Yes?").then(()=>startListening());
}
function cancelSpell(){pendingCmd=null;spelledName="";status="listening";render();addLog("Cancelled spelling","info")}
function cancelPick(){pendingCmd=null;spelledName="";status="listening";render();startListening()}

function handleUndo(){
  const last=[...logs].reverse().find(l=>l.msg.startsWith("✓")&&l.msg.includes("→"));
  if(!last)return;const m=last.msg.match(/✓ (\d+) (\w+) → (.+?) \(/);if(!m)return;
  const[,,type,name]=m;const p=data[name];if(!p)return;
  if(type==="normal")p.normal.pop();else if(type==="costco")p.costco.pop();else if(type==="lidoff")p.lidoff.pop();
  addLog("↩ Undo: "+name+" "+type,"info");render();
  sendToSheet("undo",{name,type});
}

function setTab(t){viewTab=t;render()}

function render(){
  const app=document.getElementById("app");
  const sc={idle:"#3b4a64",listening:"#4ade80",confirm:"#fbbf24",namePick:"#a78bfa",spell:"#a78bfa"}[status];
  const sl={idle:"Tap COPY to start",listening:"● Listening…",confirm:'Yes or No?',namePick:"Tap the correct name",spell:"Spell the name…"}[status];
  const sb=syncStatus==="ok"?'<span class="sync-badge ok">● Synced</span>':syncStatus==="pending"?'<span class="sync-badge pending">⟳</span>':'<span class="sync-badge err">✗</span>';

  let h=`<div class="header"><h1>${sessionActive?'<span class="rec-dot"></span>':''}🧮 Tray Tally ${sb}</h1><div style="display:flex;gap:6px">${sessionActive?'<button class="chip" onclick="handleUndo()">↩</button>':''}</div></div>`;
  h+=`<div class="status-bar"><div class="status-dot" style="background:${sc};${status==="listening"?"box-shadow:0 0 8px #4ade80":""}"></div><span style="font-size:12px;font-weight:600;color:${sc}">${sl}</span></div>`;
  h+=`<div class="tabs"><button class="tab ${viewTab==="table"?"active":""}" onclick="setTab('table')">📊 Table</button><button class="tab ${viewTab==="log"?"active":""}" onclick="setTab('log')">📋 Log (${logs.length})</button></div>`;
  h+=`<div class="content">`;

  if(viewTab==="table"){
    h+=`<div class="table-wrap"><table><thead><tr><th class="big" rowspan="2" style="position:sticky;left:0;z-index:5;min-width:68px;background:var(--surface)">Name</th><th class="big" colspan="${MAX_N}" style="color:var(--accent);text-align:center;border-left:2px solid rgba(56,189,248,.13)">Normal</th><th class="big" colspan="6" style="color:var(--orange);text-align:center;border-left:2px solid rgba(251,191,36,.13)">Costco</th><th class="big" colspan="6" style="color:var(--purple);text-align:center;border-left:2px solid rgba(167,139,250,.13)">LidOff</th><th class="big" rowspan="2" style="color:var(--green);text-align:center;border-left:2px solid rgba(74,222,128,.13)">Tot</th></tr><tr>`;
    for(let i=1;i<=MAX_N;i++)h+=`<th class="sub"${i===1?' style="border-left:2px solid rgba(56,189,248,.13)"':''}>${i}</th>`;
    for(let i=1;i<=3;i++)h+=`<th class="sub" style="color:var(--orange);${i===1?'border-left:2px solid rgba(251,191,36,.13)':''}">C${i}</th><th class="sub" style="color:rgba(251,191,36,.4)">cv</th>`;
    for(let i=1;i<=3;i++)h+=`<th class="sub" style="color:var(--purple);${i===1?'border-left:2px solid rgba(167,139,250,.13)':''}">L${i}</th><th class="sub" style="color:rgba(167,139,250,.4)">cv</th>`;
    h+=`</tr></thead><tbody>`;
    NAMES.forEach((name,ri)=>{
      const p=data[name],tot=totalFor(p),act=p.normal.length+p.costco.length+p.lidoff.length>0;
      const bg=ri%2===0?"var(--bg)":"var(--card)";
      h+=`<tr style="background:${ri%2===0?"transparent":"rgba(20,28,43,.27)"}"><td class="nm" style="background:${bg};color:${act?"var(--text)":"var(--dim)"}">${name}</td>`;
      for(let ci=0;ci<MAX_N;ci++){const v=p.normal[ci],hl=lastHL&&lastHL.name===name&&lastHL.sec==="normal"&&lastHL.idx===ci;h+=`<td class="c${hl?" hl":""}"${ci===0?' style="border-left:2px solid rgba(56,189,248,.13)"':''}>${v??""}</td>`}
      for(let ci=0;ci<3;ci++){const v=p.costco[ci],cv=v!=null?cC(v):null,hl=lastHL&&lastHL.name===name&&lastHL.sec==="costco"&&lastHL.idx===ci;h+=`<td class="c${hl?" hlc":""}" style="${ci===0?"border-left:2px solid rgba(251,191,36,.13);":""}${v!=null?"color:var(--orange)":""}">${v??""}</td><td class="c" style="color:${cv!=null?"rgba(251,191,36,.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`}
      for(let ci=0;ci<3;ci++){const v=p.lidoff[ci],cv=v!=null?lC(v):null,hl=lastHL&&lastHL.name===name&&lastHL.sec==="lidoff"&&lastHL.idx===ci;h+=`<td class="c${hl?" hll":""}" style="${ci===0?"border-left:2px solid rgba(167,139,250,.13);":""}${v!=null?"color:var(--purple)":""}">${v??""}</td><td class="c" style="color:${cv!=null?"rgba(167,139,250,.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`}
      h+=`<td class="c" style="font-weight:700;font-size:12px;color:${tot>0?"var(--green)":"var(--dim)"};border-left:2px solid rgba(74,222,128,.13);font-family:'Outfit'">${tot}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }else{
    h+=`<div class="log-wrap">`;
    if(!logs.length)h+=`<p style="font-size:12px;color:var(--dim)">No activity yet.</p>`;
    logs.forEach(l=>{h+=`<div class="log-entry ${l.type}"><span class="log-time">${l.t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>${l.msg}</div>`});
    h+=`<div id="logsEnd"></div></div>`;
  }
  h+=`</div><div class="bottom">`;
  if(transcript)h+=`<div class="transcript"><p>🗣 "${transcript}"</p></div>`;

  // Confirm
  if(status==="confirm"&&pendingCmd){
    const tc=pendingCmd.type==="costco"?"var(--orange)":pendingCmd.type==="lidoff"?"var(--purple)":"var(--accent)";
    h+=`<div class="confirm-box"><span class="confirm-val"><span style="color:${tc}">${pendingCmd.value}</span>`;
    if(pendingCmd.type!=="normal")h+=`<span style="color:${tc};font-size:15px"> ${pendingCmd.type}</span>`;
    h+=`<span style="color:var(--muted);font-size:15px"> → </span><span>${pendingCmd.name}</span></span>`;
    h+=`<div class="confirm-btns"><button class="btn-no" onclick="doDeny()">✗ NO</button><button class="btn-yes" onclick="doConfirm()">✓ YES</button></div>`;
    h+=`<p style="margin-top:6px;font-size:10px;color:var(--dim)">Or say "yes" / "no"</p></div>`;
  }

  // Spell mode + name picker backup
  if(status==="spell"&&pendingCmd){
    h+=`<div class="spell-box"><p class="spell-title">Spell the name (say letters) or tap below</p>`;
    h+=`<div class="spell-letters">${spelledName?spelledName.toUpperCase().split("").join(" "):"..."}</div>`;
    h+=`<p class="spell-hint">Say letters, then "done" when finished</p></div>`;
    // Also show name picker as tap backup
    h+=`<div class="name-picker"><div class="name-grid">`;
    NAMES.forEach(n=>{h+=`<button class="name-btn" onclick="pickName('${n}')">${n}</button>`});
    h+=`</div><button class="cancel-btn" onclick="cancelPick()">✗ Cancel</button></div>`;
  }

  // Name picker only (legacy, shouldn't trigger now)
  if(status==="namePick"&&pendingCmd){
    h+=`<div class="name-picker"><p class="name-picker-title">${pendingCmd.value} ${pendingCmd.type!=="normal"?pendingCmd.type:""} — who?</p><div class="name-grid">`;
    NAMES.forEach(n=>{h+=`<button class="name-btn" onclick="pickName('${n}')">${n}</button>`});
    h+=`</div><button class="cancel-btn" onclick="cancelPick()">✗ Cancel</button></div>`;
  }

  h+=`<div class="main-btn-wrap">`;
  if(!sessionActive)h+=`<button class="btn-copy" onclick="startSession()"><span style="font-size:30px">🎤</span> COPY</button>`;
  else h+=`<button class="btn-done" onclick="endSession()">■ DONE</button>`;
  h+=`</div>`;
  if(!sessionActive)h+=`<p class="hint"><span style="color:var(--accent)">[num] [name]</span> · <span style="color:var(--accent)">[num] rock/pacific [name]</span> · <span style="color:var(--orange)">[num] costco [name]</span> · <span style="color:var(--purple)">[num] lidoff [name]</span></p>`;
  h+=`</div>`;
  app.innerHTML=h;
  const le=document.getElementById("logsEnd");if(le)le.scrollIntoView({behavior:"smooth"});
}
render();
</script>
</body>
</html>
