<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tray Tally</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--surface:#0c1018;--card:#141c2b;--border:#1e2d44;--accent:#38bdf8;--accentDim:rgba(56,189,248,0.12);--green:#4ade80;--greenDim:rgba(74,222,128,0.15);--red:#fb7185;--redDim:rgba(251,113,133,0.15);--orange:#fbbf24;--orangeDim:rgba(251,191,36,0.12);--purple:#a78bfa;--purpleDim:rgba(167,139,250,0.12);--text:#e4eaf4;--muted:#6e819e;--dim:#3b4a64}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite}
.chip{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;min-height:30px}
.recent{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.ri{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.ri.normal{background:var(--accentDim);color:var(--accent)}.ri.costco{background:var(--orangeDim);color:var(--orange)}.ri.lidoff{background:var(--purpleDim);color:var(--purple)}
.sbar{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%}
.hbox{padding:12px 14px;border-bottom:1px solid var(--border);text-align:center;animation:fadeUp .2s;background:var(--card)}
.hnum{font-size:32px;font-weight:800}.htype{font-size:14px;font-weight:700;margin-left:6px}.hname{font-size:18px;font-weight:700;margin-left:8px}
.hraw{font-size:10px;color:var(--dim);margin-top:2px}
.cbtn{display:flex;gap:8px;margin-top:8px}
.bno{flex:1;padding:16px;border-radius:14px;border:2px solid rgba(251,113,133,.27);background:var(--redDim);color:var(--red);font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;min-height:54px}
.byes{flex:1;padding:16px;border-radius:14px;border:2px solid rgba(74,222,128,.27);background:var(--greenDim);color:var(--green);font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;min-height:54px}
.spbox{padding:10px 14px;border-bottom:1px solid var(--border);text-align:center;animation:fadeUp .2s}
.spletters{font-size:28px;font-weight:800;letter-spacing:4px;color:var(--accent);min-height:36px;margin:6px 0}
.spmatch{font-size:16px;color:var(--green);font-weight:700;margin:4px 0}
.sphint{font-size:10px;color:var(--dim)}
.spbar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.spfill{height:100%;background:var(--green);transition:width .1s linear}
.nsec{padding:8px 10px;overflow:auto}
.nsec-title{font-size:10px;font-weight:700;color:var(--dim);text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.ngrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.nbtn{padding:12px 6px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;min-height:46px;text-align:center}
.nbtn:active{transform:scale(0.95);background:var(--accentDim);border-color:var(--accent)}
.content{flex:1;overflow:auto}
.twrap{padding:6px;overflow:auto}
table{border-collapse:separate;border-spacing:0;font-size:10px;font-family:'IBM Plex Mono',monospace;min-width:100%}
th.b{padding:6px 4px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--muted);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0;z-index:3;white-space:nowrap}
th.s{padding:4px 3px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--dim);font-weight:600;font-size:8px;text-align:center;position:sticky;top:22px;z-index:3;white-space:nowrap}
td.nm{padding:6px 8px;border-bottom:1px solid rgba(30,45,68,.15);font-weight:700;font-size:11px;font-family:'Outfit';white-space:nowrap;position:sticky;left:0;z-index:2;border-right:1px solid var(--border)}
td.c{padding:5px 6px;border-bottom:1px solid rgba(30,45,68,.12);text-align:center;min-width:28px;font-size:11px}
td.c.hl{background:var(--accentDim);animation:pop .3s}
td.c.hlc{background:var(--orangeDim);animation:pop .3s}
td.c.hll{background:var(--purpleDim);animation:pop .3s}
.lw{padding:10px 14px}
.le{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(30,45,68,.07);font-family:'IBM Plex Mono',monospace}
.le.error{color:var(--red)}.le.success{color:var(--green)}.le.info{color:var(--muted)}
.lt{opacity:.3;margin-right:6px;font-size:9px}
.bottom{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.mbw{padding:12px 16px 16px;display:flex;justify-content:center}
.bcopy{width:100%;max-width:340px;padding:20px;border-radius:20px;border:none;background:linear-gradient(145deg,var(--accent),#6366f1);color:#fff;font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 30px rgba(56,189,248,.3);display:flex;align-items:center;justify-content:center;gap:12px}
.bdone{width:100%;max-width:340px;padding:20px;border-radius:20px;border:2px solid rgba(251,113,133,.27);background:var(--redDim);color:var(--red);font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:12px}
.hint{text-align:center;font-size:10px;color:var(--dim);padding:0 14px 10px}
.sb{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:6px}
.sb.ok{background:rgba(74,222,128,.12);color:var(--green)}.sb.pe{background:rgba(251,191,36,.12);color:var(--orange)}.sb.er{background:rgba(251,113,133,.12);color:var(--red)}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:7px;border:none;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;background:transparent;color:var(--dim);border-bottom:2px solid transparent}
.tab.a{background:var(--card);color:var(--text);border-bottom-color:var(--accent)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const GURL="https://script.google.com/macros/s/AKfycby-JkwiebFtp_R9q4oR_wDBygB_do20yrfVdHXbCG8yXtSfyjKPjuuveGSFEDEwjO5RcA/exec";
const NAMES=["David","Mark","Tala","Huong","Paulo","Bob","Dung","Lan","Lien","Hoi","Son","Chien","Ito","Hong","Tu","Nghia","Vinh","Kevin","Ninh","Phat","Linh","Dieu","Amy","Thi"];
const NL=NAMES.map(n=>n.toLowerCase());
const MN=25,MC=13,ML=3;
const cC=v=>Math.round(v*14/12),lC=v=>Math.round(v*13/17);
let D={};NAMES.forEach(n=>{D[n]={normal:[],costco:[],lidoff:[]}});
let on=false,mode="idle";
let pVal=null,pType="normal",pName=null,pRaw="";
let spelled="",spTimer=null,spStart=0,spAnimId=null;
let logs=[],recent=[],lastHL=null,rec=null,sync="ok";

async function toSheet(a,p){sync="pe";R();try{const u=new URL(GURL);u.searchParams.set("action",a);for(const[k,v]of Object.entries(p))u.searchParams.set(k,v);const r=await(await fetch(u,{redirect:"follow"})).json();sync=r.error?"er":"ok";R()}catch{sync="er";R()}}

const WN={zero:0,one:1,won:1,two:2,too:2,three:3,tree:3,free:3,four:4,five:5,hive:5,six:6,seven:7,eight:8,ate:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,thirty:30,fourteen:14,forty:40,fifteen:15,fifty:50,sixteen:16,sixty:60,seventeen:17,seventy:70,eighteen:18,eighty:80,nineteen:19,ninety:90,twenty:20,hundred:100,"một":1,"hai":2,"ba":3,"bốn":4,"năm":5,"sáu":6,"bảy":7,"tám":8,"chín":9,"mười":10,"mươi":"x10","mốt":1,"lăm":5,"nhăm":5,"mot":1,"bon":4,"nam":5,"sau":6,"bay":7,"tam":8,"chin":9,"muoi":"x10_or_10","lam":5,"nham":5};
function w2n(s){const d=parseInt(s);if(!isNaN(d))return d;const w=s.toLowerCase().replace(/-/g," ").replace(/\b(uh|um|a|the|and)\b/g,"").trim().split(/\s+/).filter(Boolean);let c=0;for(const x of w){const v=WN[x];if(v!==undefined){if(v==="x10")c=(c||1)*10;else if(v==="x10_or_10")c=(c===0)?10:c*10;else if(x==="hundred")c=(c||1)*100;else c+=v}}return c}
function lev(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));return d[m][n]}

const NA={"david":["david","davit","dave"],"mark":["mark","marc","mock"],"tala":["tala","talla","tyler","tara"],"huong":["huong","hong","hung","huang","hwong","fuong"],"paulo":["paulo","pablo","polo","paul"],"bob":["bob","bop","rob"],"dung":["dung","dong","doong","young","jung","yung"],"lan":["lan","lynn","lam","lon"],"lien":["lien","lean","leon","leen","lin"],"hoi":["hoi","hoy","hoe","hey"],"son":["son","sun","sung","sewn","zone"],"chien":["chien","chen","chicken","jean","chain","sheen"],"ito":["ito","eagle","etoh","eat oh","e2"],"hong":["hong","hung","honk"],"tu":["tu","too","to","tue"],"nghia":["nghia","nia","nea","niya","knee ya"],"vinh":["vinh","vin","veen","vine","win"],"kevin":["kevin","kelvin","gavin","kev"],"ninh":["ninh","nin","ning","neen","nine"],"phat":["phat","fat","fatt","pot","pat"],"linh":["linh","lin","ling","lynn"],"dieu":["dieu","dew","due","dio","dee you"],"amy":["amy","amee","aimee"],"thi":["thi","tea","thee","ti","tee","fee"]};

function findName(sp){
  const lo=sp.toLowerCase().trim().replace(/\b(uh|um|a|the|and|for)\b/g,"").trim();
  if(!lo)return{name:null,conf:0};
  for(let i=0;i<NAMES.length;i++)if(lo===NL[i])return{name:NAMES[i],conf:100};
  for(const[k,al]of Object.entries(NA)){const rn=NAMES.find(n=>n.toLowerCase()===k);if(!rn)continue;for(const a of al)if(lo===a||lo.includes(a))return{name:rn,conf:96}}
  const sorted=[...NAMES].sort((a,b)=>b.length-a.length);
  for(const n of sorted)if(lo.includes(n.toLowerCase()))return{name:n,conf:95};
  let bs=Infinity,bi=0;
  for(let i=0;i<NAMES.length;i++){const al=NA[NL[i]]||[NL[i]];for(const a of al){const d=lev(lo,a);if(d<bs){bs=d;bi=i}}}
  const ml=Math.max(lo.length,NL[bi].length||1);
  return{name:NAMES[bi],conf:Math.round((1-bs/ml)*100)}
}

const NW=["rock","rocks","rok","roc","pacific","pacifica","specific","pasific","normal"];
const CWW=["costco","cosco","cost co","cosko","costko","casco","koscoe","costgo","cisco","corso","kosco"];
const LWW=["lid off","lidoff","lit off","lit of","lid of","lead off","led off","led of","light off","light of","lift off","lip off","lip of","little off","lit up","lid on","lit on"];

function detectType(t){
  const lo=t.toLowerCase();
  for(const w of CWW)if(lo.includes(w))return{type:"costco",cl:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  const sl=[...LWW].sort((a,b)=>b.length-a.length);
  for(const w of sl)if(lo.includes(w))return{type:"lidoff",cl:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  for(const w of NW)if(lo.includes(w))return{type:"normal",cl:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  return{type:"normal",cl:lo}
}

function parseCmd(text){
  const{type,cl}=detectType(text);
  let c=cl.replace(/\b(for)\b/g,"").trim();
  let ns="",rest=c;
  const m=c.match(/^(\d+)\s*(.*)/);
  if(m){ns=m[1];rest=m[2].trim()}
  else{const ws=c.split(/\s+/);let nw=[],i=0;while(i<ws.length&&WN[ws[i]]!==undefined){nw.push(ws[i]);i++}if(nw.length){ns=nw.join(" ");rest=ws.slice(i).join(" ").trim()}}
  if(!ns)return null;
  const val=w2n(ns);if(val<=0)return null;
  if(!rest)return{value:val,type,name:null,conf:0};
  const{name,conf}=findName(rest);
  return{value:val,type,name,conf}
}

function spMatch(sp){
  const lo=sp.toLowerCase().replace(/[^a-z]/g,"");
  if(!lo)return null;
  for(let i=0;i<NAMES.length;i++)if(NL[i]===lo)return NAMES[i];
  for(let i=0;i<NAMES.length;i++)if(NL[i].startsWith(lo)&&lo.length>=2)return NAMES[i];
  let bs=Infinity,bi=0;
  for(let i=0;i<NAMES.length;i++){const d=lev(lo,NL[i]);if(d<bs){bs=d;bi=i}}
  return bs<=2?NAMES[bi]:null;
}

function say(t){return new Promise(r=>{speechSynthesis.cancel();setTimeout(()=>{const u=new SpeechSynthesisUtterance(t);u.rate=1.4;u.volume=1;u.pitch=1.1;u.lang="en-US";u.onend=()=>setTimeout(r,60);u.onerror=()=>setTimeout(r,60);speechSynthesis.speak(u)},30)})}
function vib(m){try{navigator.vibrate(m)}catch{}}
function log(m,t="info"){logs.push({m,t,d:new Date()});if(logs.length>60)logs=logs.slice(-60);R()}

function tot(p){
  const ns=p.normal.reduce((a,b)=>a+b,0);
  const cs=p.costco.reduce((a,b)=>a+b,0);
  const ls=p.lidoff.reduce((a,b)=>a+lC(b),0);
  return ns+(cs>0?cC(cs):0)+ls;
}

function startMic(){
  if(!on)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){log("Use Safari!","error");return}
  try{rec?.abort()}catch{}
  rec=new SR();rec.continuous=false;rec.interimResults=false;rec.lang="en-US";
  rec.onresult=(e)=>{const t=(e.results[0]?.[0]?.transcript||"").trim();if(t.length>=1){log('🗣 "'+t+'"',"info");handle(t)}};
  rec.onerror=(e)=>{if(e.error==="not-allowed"){on=false;mode="idle";log("Mic blocked","error");R()}};
  rec.onend=()=>{if(on)setTimeout(()=>{if(on)startMic()},200)};
  try{rec.start()}catch{}
}

async function handle(text){
  const lo=text.toLowerCase().trim();

  // CONFIRM
  if(mode==="confirm"){
    if(/yes|yep|yeah|yup|ok|sure|correct|confirm/.test(lo)){doYes();return}
    if(/no|nope|nah|wrong|cancel/.test(lo)){doNo();return}
    return;
  }

  // SPELL — accumulate letters
  if(mode==="spell"){
    if(/cancel|stop|never mind/.test(lo)){cancelSpell();return}
    const letters=lo.replace(/[^a-z]/g,"");
    if(letters){
      spelled+=letters;
      log("Spelling: "+spelled.toUpperCase(),"info");
      R();
      clearTimeout(spTimer);
      spStart=Date.now();
      spTimer=setTimeout(finishSpell,2000);
      animBar();
    }
    return;
  }

  // LISTENING
  if(mode==="listening"){
    const r=parseCmd(text);
    if(!r){log("Unclear","error");return}
    pVal=r.value;pType=r.type;pRaw=text;

    if(r.name&&r.conf>=90){
      pName=r.name;mode="confirm";R();
      const tl=r.type==="costco"?" costco":r.type==="lidoff"?" lid off":"";
      await say(r.value+tl+" "+r.name+". Yes?");
      return;
    }

    // Not confident → spell mode
    pName=null;spelled="";mode="spell";R();
    clearTimeout(spTimer);
    const tl=r.type==="costco"?" costco":r.type==="lidoff"?" lid off":"";
    await say(r.value+tl+". Spell name.");
    return;
  }
}

function animBar(){
  cancelAnimationFrame(spAnimId);
  function tick(){
    const el=document.getElementById("spbar");
    if(!el||mode!=="spell")return;
    const pct=Math.min(100,(Date.now()-spStart)/2000*100);
    el.style.width=pct+"%";
    if(pct<100)spAnimId=requestAnimationFrame(tick);
  }
  tick();
}

async function finishSpell(){
  clearTimeout(spTimer);cancelAnimationFrame(spAnimId);
  const matched=spMatch(spelled);
  if(matched){
    log("Spelled → "+matched,"success");
    addEntry(pVal,pType,matched);
    spelled="";pVal=null;mode="listening";R();
    vib([50,30,50]);
    await say(matched+". Done.");
    return;
  }
  log("No match: "+spelled.toUpperCase(),"error");
  spelled="";mode="pickName";R();
  await say("No match. Tap name.");
}

async function doYes(){
  if(!pName||!pVal)return;
  addEntry(pVal,pType,pName);
  pVal=null;pName=null;mode="listening";R();
  vib([50,30,50]);
  await say("Done.");
}
async function doNo(){pVal=null;pName=null;mode="listening";R();await say("Again.")}

function tapName(name){
  if(!pVal)return;
  addEntry(pVal,pType,name);
  pVal=null;pName=null;spelled="";mode="listening";R();
  vib([50,30,50]);
  say("Done.");
}

function cancelSpell(){clearTimeout(spTimer);cancelAnimationFrame(spAnimId);spelled="";mode="listening";R()}

function addEntry(val,type,name){
  const p=D[name];if(!p)return;
  if(type==="normal"){if(p.normal.length>=MN){log(name+": full","error");return}p.normal.push(val);lastHL={name,sec:"normal",idx:p.normal.length-1}}
  else if(type==="costco"){if(p.costco.length>=MC){log(name+": costco full","error");return}p.costco.push(val);lastHL={name,sec:"costco",idx:p.costco.length-1}}
  else if(type==="lidoff"){if(p.lidoff.length>=ML){log(name+": lidoff full","error");return}p.lidoff.push(val);lastHL={name,sec:"lidoff",idx:p.lidoff.length-1}}
  const tl=type==="costco"?" costco":type==="lidoff"?" lidoff":"";
  recent.unshift({val,type,name});if(recent.length>5)recent=recent.slice(0,5);
  log("✓ "+val+tl+" → "+name+" ("+tot(D[name])+")","success");
  R();setTimeout(()=>{lastHL=null;R()},2000);
  toSheet("add",{name,value:val,type});
}

function undo(){
  if(!recent.length)return;
  const e=recent.shift();const p=D[e.name];if(!p)return;
  if(e.type==="normal")p.normal.pop();else if(e.type==="costco")p.costco.pop();else if(e.type==="lidoff")p.lidoff.pop();
  log("↩ "+e.name,"info");R();toSheet("undo",{name:e.name,type:e.type});
}

async function start(){on=true;mode="listening";log("Session started","success");R();await say("Ready.");startMic()}
async function stop(){on=false;try{rec?.abort()}catch{}clearTimeout(spTimer);cancelAnimationFrame(spAnimId);mode="idle";pVal=null;pName=null;spelled="";log("Session ended","info");R();await say("Done.")}
function setView(v){mode=v;R()}

function R(){
  const app=document.getElementById("app");
  const sb=sync==="ok"?'<span class="sb ok">●</span>':sync==="pe"?'<span class="sb pe">⟳</span>':'<span class="sb er">✗</span>';
  let h="";

  if(!on){
    h+=`<div class="header"><h1>🧮 Tray Tally ${sb}</h1></div>`;
    if(recent.length){h+=`<div class="recent">`;recent.forEach(e=>{h+=`<span class="ri ${e.type}">${e.val}→${e.name}</span>`});h+=`</div>`}
    h+=renderT();
    h+=`<div class="bottom"><div class="mbw"><button class="bcopy" onclick="start()"><span style="font-size:28px">🎤</span> COPY</button></div>`;
    h+=`<p class="hint"><span style="color:var(--accent)">[num] [name]</span> · <span style="color:var(--accent)">[num] rock/pacific [name]</span> · <span style="color:var(--orange)">[num] costco [name]</span> · <span style="color:var(--purple)">[num] lidoff [name]</span></p></div>`;
    app.innerHTML=h;return;
  }

  h+=`<div class="header"><h1><span class="rec-dot"></span> Tray Tally ${sb}</h1><div style="display:flex;gap:5px">`;
  h+=`<button class="chip" onclick="undo()">↩</button>`;
  h+=`<button class="chip" onclick="setView('table')">📊</button>`;
  h+=`<button class="chip" onclick="setView('log')">📋</button>`;
  h+=`</div></div>`;
  if(recent.length){h+=`<div class="recent">`;recent.forEach(e=>{h+=`<span class="ri ${e.type}">${e.val}→${e.name}</span>`});h+=`</div>`}

  if(mode==="table"){h+=renderT();h+=done();app.innerHTML=h;return}
  if(mode==="log"){h+=`<div class="content"><div class="lw">`;logs.forEach(l=>{h+=`<div class="le ${l.t}"><span class="lt">${l.d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>${l.m}</div>`});h+=`</div></div>`+done();app.innerHTML=h;return}

  // LISTENING
  if(mode==="listening"){
    h+=`<div class="sbar"><div class="sdot" style="background:var(--green);box-shadow:0 0 8px var(--green)"></div><span style="font-size:13px;font-weight:700;color:var(--green)">● Listening…</span></div>`;
    h+=`<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:16px"><p style="font-size:14px;color:var(--dim);text-align:center;line-height:2"><span style="color:var(--accent)">"20 David"</span> · <span style="color:var(--accent)">"20 rock David"</span><br><span style="color:var(--orange)">"20 costco Mark"</span> · <span style="color:var(--purple)">"15 lidoff Huong"</span></p></div>`;
  }

  // CONFIRM
  if(mode==="confirm"&&pName){
    const tc=pType==="costco"?"var(--orange)":pType==="lidoff"?"var(--purple)":"var(--accent)";
    const tl=pType==="costco"?"COSTCO":pType==="lidoff"?"LIDOFF":"";
    h+=`<div class="hbox"><span class="hnum" style="color:${tc}">${pVal}</span>`;
    if(tl)h+=`<span class="htype" style="color:${tc}">${tl}</span>`;
    h+=`<span class="hname">→ ${pName}</span>`;
    h+=`<div class="hraw">"${pRaw}"</div>`;
    h+=`<div class="cbtn"><button class="bno" onclick="doNo()">✗ NO</button><button class="byes" onclick="doYes()">✓ YES</button></div>`;
    h+=`<p style="font-size:9px;color:var(--dim);margin-top:4px">Say yes or no</p></div><div style="flex:1"></div>`;
  }

  // SPELL (primary) + tap grid (backup below)
  if(mode==="spell"){
    const tc=pType==="costco"?"var(--orange)":pType==="lidoff"?"var(--purple)":"var(--accent)";
    const tl=pType==="costco"?"COSTCO":pType==="lidoff"?"LIDOFF":"";
    h+=`<div class="hbox"><span class="hnum" style="color:${tc}">${pVal}</span>`;
    if(tl)h+=`<span class="htype" style="color:${tc}">${tl}</span>`;
    h+=`<div class="hraw">"${pRaw}"</div></div>`;
    h+=`<div class="spbox"><div class="spletters">${spelled?spelled.toUpperCase().split("").join(" "):"…"}</div>`;
    const matched=spelled?spMatch(spelled):null;
    if(matched)h+=`<div class="spmatch">→ ${matched}</div>`;
    h+=`<div class="spbar"><div class="spfill" id="spbar" style="width:0%"></div></div>`;
    h+=`<div class="sphint">Spell the name · Auto-saves 2s after last letter</div></div>`;
    h+=`<div class="nsec" style="flex:1;overflow:auto"><p class="nsec-title">Or tap name</p><div class="ngrid">`;
    NAMES.forEach(n=>{h+=`<button class="nbtn" onclick="tapName('${n}')">${n}</button>`});
    h+=`</div></div>`;
  }

  // PICK NAME (fallback after failed spell)
  if(mode==="pickName"){
    const tc=pType==="costco"?"var(--orange)":pType==="lidoff"?"var(--purple)":"var(--accent)";
    h+=`<div class="hbox"><span class="hnum" style="color:${tc}">${pVal}</span><div class="hraw">Tap name</div></div>`;
    h+=`<div class="nsec" style="flex:1;overflow:auto"><div class="ngrid">`;
    NAMES.forEach(n=>{h+=`<button class="nbtn" onclick="tapName('${n}')">${n}</button>`});
    h+=`</div></div>`;
  }

  h+=done();
  app.innerHTML=h;
  if(mode==="spell"&&spelled)animBar();
}

function done(){return`<div class="bottom"><div class="mbw"><button class="bdone" onclick="stop()">■ DONE</button></div></div>`}

function renderT(){
  let h=`<div class="content"><div class="twrap"><table><thead><tr><th class="b" rowspan="2" style="position:sticky;left:0;z-index:5;min-width:68px;background:var(--surface)">Name</th><th class="b" colspan="${MN}" style="color:var(--accent);text-align:center;border-left:2px solid rgba(56,189,248,.13)">Normal</th><th class="b" colspan="${MC+1}" style="color:var(--orange);text-align:center;border-left:2px solid rgba(251,191,36,.13)">Costco</th><th class="b" colspan="${ML*2}" style="color:var(--purple);text-align:center;border-left:2px solid rgba(167,139,250,.13)">LidOff</th><th class="b" rowspan="2" style="color:var(--green);text-align:center;border-left:2px solid rgba(74,222,128,.13)">Tot</th></tr><tr>`;
  for(let i=1;i<=MN;i++)h+=`<th class="s"${i===1?' style="border-left:2px solid rgba(56,189,248,.13)"':''}>${i}</th>`;
  for(let i=1;i<=MC;i++)h+=`<th class="s" style="color:var(--orange);${i===1?'border-left:2px solid rgba(251,191,36,.13)':''}">C${i}</th>`;
  h+=`<th class="s" style="color:rgba(251,191,36,.4)">cv</th>`;
  for(let i=1;i<=ML;i++)h+=`<th class="s" style="color:var(--purple);${i===1?'border-left:2px solid rgba(167,139,250,.13)':''}">L${i}</th><th class="s" style="color:rgba(167,139,250,.4)">cv</th>`;
  h+=`</tr></thead><tbody>`;
  NAMES.forEach((name,ri)=>{
    const p=D[name],t=tot(p),a=p.normal.length+p.costco.length+p.lidoff.length>0;
    const bg=ri%2===0?"var(--bg)":"var(--card)";
    h+=`<tr style="background:${ri%2===0?"transparent":"rgba(20,28,43,.27)"}"><td class="nm" style="background:${bg};color:${a?"var(--text)":"var(--dim)"}">${name}</td>`;
    
    // Normal Columns
    for(let i=0;i<MN;i++){const v=p.normal[i],hl=lastHL&&lastHL.name===name&&lastHL.sec==="normal"&&lastHL.idx===i;h+=`<td class="c${hl?" hl":""}"${i===0?' style="border-left:2px solid rgba(56,189,248,.13)"':''}>${v??""}</td>`}
    
    // Costco Columns
    let cSum=0;
    for(let i=0;i<MC;i++){
      const v=p.costco[i];
      if(v!=null)cSum+=v;
      const hl=lastHL&&lastHL.name===name&&lastHL.sec==="costco"&&lastHL.idx===i;
      h+=`<td class="c${hl?" hlc":""}" style="${i===0?"border-left:2px solid rgba(251,191,36,.13);":""}${v!=null?"color:var(--orange)":""}">${v??""}</td>`;
    }
    const cvTotal = cSum>0?cC(cSum):"";
    h+=`<td class="c" style="color:rgba(251,191,36,.47);font-style:italic;font-size:9px">${cvTotal}</td>`;
    
    // LidOff Columns
    for(let i=0;i<ML;i++){
      const v=p.lidoff[i],cv=v!=null?lC(v):null,hl=lastHL&&lastHL.name===name&&lastHL.sec==="lidoff"&&lastHL.idx===i;
      h+=`<td class="c${hl?" hll":""}" style="${i===0?"border-left:2px solid rgba(167,139,250,.13);":""}${v!=null?"color:var(--purple)":""}">${v??""}</td><td class="c" style="color:${cv!=null?"rgba(167,139,250,.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`
    }
    
    // Total Column
    h+=`<td class="c" style="font-weight:700;font-size:12px;color:${t>0?"var(--green)":"var(--dim)"};border-left:2px solid rgba(74,222,128,.13);font-family:'Outfit'">${t}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;return h;
}
R();
</script>
</body>
</html>
