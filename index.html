<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tray Tally</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--surface:#0c1018;--card:#141c2b;--border:#1e2d44;--accent:#38bdf8;--accentDim:rgba(56,189,248,0.12);--green:#4ade80;--greenDim:rgba(74,222,128,0.15);--red:#fb7185;--redDim:rgba(251,113,133,0.15);--orange:#fbbf24;--orangeDim:rgba(251,191,36,0.12);--purple:#a78bfa;--purpleDim:rgba(167,139,250,0.12);--text:#e4eaf4;--muted:#6e819e;--dim:#3b4a64}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes flash{0%{background:var(--greenDim)}100%{background:transparent}}

.header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite}
.chip{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;min-height:30px}

/* Recent entries bar */
.recent{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.recent-item{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;animation:fadeUp .3s}
.recent-item.normal{background:var(--accentDim);color:var(--accent)}
.recent-item.costco{background:var(--orangeDim);color:var(--orange)}
.recent-item.lidoff{background:var(--purpleDim);color:var(--purple)}

.status-bar{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%}

/* Heard number display */
.heard-box{padding:14px;border-bottom:1px solid var(--border);text-align:center;animation:fadeUp .2s;background:var(--card)}
.heard-number{font-size:36px;font-weight:800;color:var(--text)}
.heard-type{font-size:16px;font-weight:700;margin-left:8px}
.heard-type.normal{color:var(--accent)}
.heard-type.costco{color:var(--orange)}
.heard-type.lidoff{color:var(--purple)}
.heard-raw{font-size:11px;color:var(--dim);margin-top:4px}
.heard-wrong{display:flex;gap:8px;justify-content:center;margin-top:10px}
.heard-wrong button{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.heard-wrong button.redo{border-color:rgba(251,113,133,.3);color:var(--red);background:var(--redDim)}

/* Name grid */
.name-section{padding:10px;flex:1;overflow:auto}
.name-section-title{font-size:11px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.name-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.name-btn{padding:14px 8px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;min-height:50px;text-align:center;transition:all .15s}
.name-btn:active{transform:scale(0.95);background:var(--accentDim);border-color:var(--accent)}
.name-btn.has-data{border-color:rgba(56,189,248,.2)}

/* Number pad for manual entry */
.numpad{padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.numpad button{padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px}
.numpad button:active{background:var(--accentDim)}
.numpad button.type-btn{font-size:11px;font-weight:700}
.numpad button.type-btn.sel{border-color:var(--accent);background:var(--accentDim)}

.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:7px;border:none;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;background:transparent;color:var(--dim);border-bottom:2px solid transparent}
.tab.active{background:var(--card);color:var(--text);border-bottom-color:var(--accent)}

.content{flex:1;overflow:auto}
.table-wrap{padding:6px;overflow:auto}
table{border-collapse:separate;border-spacing:0;font-size:10px;font-family:'IBM Plex Mono',monospace;min-width:100%}
th.big{padding:6px 4px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--muted);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0;z-index:3;white-space:nowrap}
th.sub{padding:4px 3px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--dim);font-weight:600;font-size:8px;text-align:center;position:sticky;top:22px;z-index:3;white-space:nowrap}
td.nm{padding:6px 8px;border-bottom:1px solid rgba(30,45,68,.15);font-weight:700;font-size:11px;font-family:'Outfit';white-space:nowrap;position:sticky;left:0;z-index:2;border-right:1px solid var(--border)}
td.c{padding:5px 6px;border-bottom:1px solid rgba(30,45,68,.12);text-align:center;min-width:28px;font-size:11px}
td.c.hl{background:var(--accentDim);animation:pop .3s}
td.c.hlc{background:var(--orangeDim);animation:pop .3s}
td.c.hll{background:var(--purpleDim);animation:pop .3s}

.log-wrap{padding:10px 14px}
.log-entry{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(30,45,68,.07);font-family:'IBM Plex Mono',monospace}
.log-entry.error{color:var(--red)}.log-entry.success{color:var(--green)}.log-entry.info{color:var(--muted)}
.log-time{opacity:.3;margin-right:6px;font-size:9px}

.bottom{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.main-btn-wrap{padding:14px 16px 20px;display:flex;justify-content:center}
.btn-copy{width:100%;max-width:340px;padding:22px;border-radius:20px;border:none;background:linear-gradient(145deg,var(--accent),#6366f1);color:#fff;font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 30px rgba(56,189,248,.3);display:flex;align-items:center;justify-content:center;gap:12px}
.btn-done{width:100%;max-width:340px;padding:22px;border-radius:20px;border:2px solid rgba(251,113,133,.27);background:var(--redDim);color:var(--red);font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:12px}
.hint{text-align:center;font-size:10px;color:var(--dim);padding:0 14px 12px}
.sync-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:6px}
.sync-badge.ok{background:rgba(74,222,128,.12);color:var(--green)}
.sync-badge.pending{background:rgba(251,191,36,.12);color:var(--orange)}
.sync-badge.err{background:rgba(251,113,133,.12);color:var(--red)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycby-JkwiebFtp_R9q4oR_wDBygB_do20yrfVdHXbCG8yXtSfyjKPjuuveGSFEDEwjO5RcA/exec";
const NAMES=["David","Mark","Tala","Huong","Paulo","Bob","Dung","Lan","Lien","Hoi","Son","Chien Ito","Hong","Tu","Nghia","Vinh","Kevin","Ninh","Phat","Linh","Dieu","Amy","Thi"];
const MAX_N=15,MAX_C=3,MAX_L=3;
const cC=v=>Math.round(v*14/12),lC=v=>Math.round(v*13/17);

let data={};NAMES.forEach(n=>{data[n]={normal:[],costco:[],lidoff:[]}});
let sessionActive=false;
// Modes: idle | listening | pickName | table | log
let mode="idle";
let heardValue=null,heardType="normal",heardRaw="";
let manualNum="",manualType="normal";
let logs=[],recentEntries=[],lastHL=null;
let rec=null,syncStatus="ok";
let inputMode="voice"; // voice | manual

// ── Sheet sync ──
async function sendToSheet(action,params){
  syncStatus="pending";render();
  try{
    const url=new URL(SCRIPT_URL);url.searchParams.set("action",action);
    for(const[k,v]of Object.entries(params))url.searchParams.set(k,v);
    const r=await(await fetch(url.toString(),{redirect:"follow"})).json();
    syncStatus=r.error?"error":"ok";render();return r;
  }catch(e){syncStatus="error";render();return{error:e.message}}
}

// ── Numbers — aggressive fuzzy matching ──
const WN={zero:0,one:1,won:1,two:2,to:2,too:2,three:3,tree:3,free:3,four:4,for:4,fore:4,five:5,hive:5,six:6,sic:6,sex:6,seven:7,eight:8,ate:8,nine:9,dine:9,mine:9,ten:10,tin:10,eleven:11,twelve:12,thirteen:13,thirty:30,fourteen:14,forty:40,fifteen:15,fifty:50,sixteen:16,sixty:60,seventeen:17,seventy:70,eighteen:18,eighty:80,nineteen:19,ninety:90,twenty:20,plenty:20,hundred:100};

function w2n(s){
  const d=parseInt(s);if(!isNaN(d))return d;
  // Clean filler
  const ws=s.toLowerCase().replace(/-/g," ").replace(/\b(uh|um|a|the|and)\b/g,"").trim().split(/\s+/).filter(Boolean);
  let c=0;
  for(const w of ws){
    if(WN[w]!==undefined){if(w==="hundred")c=(c||1)*100;else c+=WN[w]}
  }
  return c;
}

// Extract number from start of string, return {value, rest}
function extractNumber(text){
  const lo=text.toLowerCase().trim();
  // Try digits first
  const dm=lo.match(/^(\d+)\s*(.*)/);
  if(dm)return{value:parseInt(dm[1]),rest:dm[2].trim()};
  // Try word numbers
  const ws=lo.split(/\s+/);
  let nw=[],i=0;
  while(i<ws.length){
    const w=ws[i].replace(/[^a-z]/g,"");
    if(WN[w]!==undefined){nw.push(w);i++}
    else break;
  }
  if(nw.length){
    const val=w2n(nw.join(" "));
    return{value:val,rest:ws.slice(i).join(" ").trim()};
  }
  return null;
}

// ── Type detection ──
const NORMAL_W=["rock","rocks","rok","roc","rog","pacific","pacifica","specific","pasific","normal"];
const COSTCO_W=["costco","cosco","cost co","cos co","cosko","costko","casco","costcow","koscoe","costico","custom","costgo","cisco","corso","kosco"];
const LIDOFF_W=["lid off","lidoff","lit off","lit of","lid of","lead off","led off","led of","light off","light of","lift off","lip off","lip of","little off","little of","lit up","lid on","lit on"];

function detectAndRemoveType(text){
  const lo=text.toLowerCase();
  for(const w of COSTCO_W)if(lo.includes(w))return{type:"costco",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  const sl=[...LIDOFF_W].sort((a,b)=>b.length-a.length);
  for(const w of sl)if(lo.includes(w))return{type:"lidoff",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  for(const w of NORMAL_W)if(lo.includes(w))return{type:"normal",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  return{type:"normal",cleaned:lo};
}

// ── Parse voice: extract number + type, ignore name part ──
function parseVoice(text){
  // First detect type
  const{type,cleaned}=detectAndRemoveType(text);
  // Remove filler
  let cl=cleaned.replace(/\b(uh|um|a|the|and|for|four|fore)\b/g,"").trim();
  // If "for" was removed but was actually the number 4, handle it
  // Extract number
  const nr=extractNumber(cl);
  if(!nr||nr.value<=0)return null;
  return{value:nr.value,type};
}

// ── TTS — loud and clear ──
function speak(text){
  return new Promise(r=>{
    speechSynthesis.cancel();
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(text);
      u.rate=0.95; // Slower for clarity in noise
      u.volume=1.0; // Max
      u.pitch=1.1; // Slightly higher pitch cuts through noise better
      u.lang="en-US";
      u.onend=()=>setTimeout(r,150);
      u.onerror=()=>setTimeout(r,150);
      speechSynthesis.speak(u);
    },80);
  });
}

function vibrate(ms){try{navigator.vibrate(ms)}catch{}}

function addLog(msg,type="info"){logs.push({msg,type,t:new Date()});if(logs.length>60)logs=logs.slice(-60);render()}
function totalFor(p){return p.normal.reduce((a,b)=>a+b,0)+p.costco.reduce((a,b)=>a+cC(b),0)+p.lidoff.reduce((a,b)=>a+lC(b),0)}

// ── Mic ──
function startListening(){
  if(!sessionActive)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addLog("Use Safari!","error");return}
  try{rec?.abort()}catch{}
  rec=new SR();rec.continuous=false;rec.interimResults=false;rec.lang="en-US";
  rec.onstart=()=>{if(mode==="listening")render()};
  rec.onresult=(e)=>{
    const t=(e.results[0]?.[0]?.transcript||"").trim();
    if(t.length<2)return; // Ignore noise bursts
    addLog('🗣 "'+t+'"',"info");
    handleVoice(t);
  };
  rec.onerror=(e)=>{
    if(e.error==="not-allowed"){sessionActive=false;mode="idle";addLog("Mic blocked!","error");render();return}
    // Silently ignore no-speech and aborted in noisy env
  };
  rec.onend=()=>{
    // Auto-restart if in listening mode
    if(sessionActive&&mode==="listening"){
      setTimeout(()=>{if(sessionActive&&mode==="listening")startListening()},200);
    }
  };
  try{rec.start()}catch{}
}

// ── Handle voice input ──
async function handleVoice(text){
  if(mode!=="listening")return;

  const result=parseVoice(text);
  if(!result){
    // Too noisy or couldn't parse — just ignore and keep listening
    addLog("Noise/unclear — listening…","error");
    return;
  }

  // Got a number + type!
  heardValue=result.value;
  heardType=result.type;
  heardRaw=text;
  mode="pickName";
  try{rec?.abort()}catch{}
  render();

  vibrate(50);
  const typeLabel=result.type==="costco"?" costco":result.type==="lidoff"?" lid off":"";
  await speak(result.value+typeLabel+". Tap name.");
}

// ── Tap name → instant add ──
async function tapName(name){
  if(mode!=="pickName"||heardValue===null)return;

  const cmd={value:heardValue,type:heardType,name};

  // Apply locally
  const p=data[name];if(!p)return;
  if(cmd.type==="normal"){if(p.normal.length>=MAX_N){addLog(name+": full","error");return}p.normal.push(cmd.value);lastHL={name,sec:"normal",idx:p.normal.length-1}}
  else if(cmd.type==="costco"){if(p.costco.length>=MAX_C){addLog(name+": costco full","error");return}p.costco.push(cmd.value);lastHL={name,sec:"costco",idx:p.costco.length-1}}
  else if(cmd.type==="lidoff"){if(p.lidoff.length>=MAX_L){addLog(name+": lidoff full","error");return}p.lidoff.push(cmd.value);lastHL={name,sec:"lidoff",idx:p.lidoff.length-1}}

  const typeLabel=cmd.type==="costco"?" costco":cmd.type==="lidoff"?" lidoff":"";
  recentEntries.unshift({value:cmd.value,type:cmd.type,name,t:new Date()});
  if(recentEntries.length>5)recentEntries=recentEntries.slice(0,5);
  addLog("✓ "+cmd.value+typeLabel+" → "+name+" ("+totalFor(data[name])+")","success");

  vibrate([50,30,50]);
  heardValue=null;heardType="normal";heardRaw="";
  mode="listening";
  render();
  setTimeout(()=>{lastHL=null;render()},2000);

  await speak("Done.");
  startListening();

  // Sync to sheet in background
  sendToSheet("add",{name:cmd.name,value:cmd.value,type:cmd.type});
}

// ── Manual number entry (tap pad) ──
function tapNum(n){manualNum+=n;render()}
function tapClear(){manualNum="";render()}
function tapBackspace(){manualNum=manualNum.slice(0,-1);render()}
function tapManualType(t){manualType=t;render()}

function tapManualName(name){
  const val=parseInt(manualNum);
  if(!val||val<=0){addLog("Enter a number first","error");return}

  const cmd={value:val,type:manualType,name};
  const p=data[name];if(!p)return;
  if(cmd.type==="normal"){if(p.normal.length>=MAX_N){addLog(name+": full","error");return}p.normal.push(cmd.value);lastHL={name,sec:"normal",idx:p.normal.length-1}}
  else if(cmd.type==="costco"){if(p.costco.length>=MAX_C){addLog(name+": costco full","error");return}p.costco.push(cmd.value);lastHL={name,sec:"costco",idx:p.costco.length-1}}
  else if(cmd.type==="lidoff"){if(p.lidoff.length>=MAX_L){addLog(name+": lidoff full","error");return}p.lidoff.push(cmd.value);lastHL={name,sec:"lidoff",idx:p.lidoff.length-1}}

  const tl=cmd.type==="costco"?" costco":cmd.type==="lidoff"?" lidoff":"";
  recentEntries.unshift({value:cmd.value,type:cmd.type,name,t:new Date()});
  if(recentEntries.length>5)recentEntries=recentEntries.slice(0,5);
  addLog("✓ "+cmd.value+tl+" → "+name+" ("+totalFor(data[name])+")","success");

  vibrate([50,30,50]);
  manualNum="";render();
  setTimeout(()=>{lastHL=null;render()},2000);
  sendToSheet("add",{name:cmd.name,value:cmd.value,type:cmd.type});
}

// ── Cancel / redo ──
function cancelHeard(){heardValue=null;mode="listening";render();startListening()}
function redoVoice(){heardValue=null;mode="listening";render();startListening()}

// ── Undo ──
function handleUndo(){
  if(!recentEntries.length)return;
  const last=recentEntries[0];
  const p=data[last.name];if(!p)return;
  if(last.type==="normal")p.normal.pop();
  else if(last.type==="costco")p.costco.pop();
  else if(last.type==="lidoff")p.lidoff.pop();
  recentEntries.shift();
  addLog("↩ Undo: "+last.name,"info");render();
  sendToSheet("undo",{name:last.name,type:last.type});
}

// ── Session ──
async function startSession(){
  sessionActive=true;mode="listening";inputMode="voice";
  addLog("Session started","success");render();
  await speak("Ready. Say the number.");
  startListening();
}
async function endSession(){
  sessionActive=false;try{rec?.abort()}catch{}
  mode="idle";heardValue=null;manualNum="";
  addLog("Session ended","info");render();
  await speak("Done.");
}

function switchToManual(){inputMode="manual";mode="pickName";try{rec?.abort()}catch{}render()}
function switchToVoice(){inputMode="voice";mode="listening";manualNum="";render();startListening()}

function setView(v){mode=v;render()}

// ══════════════════════════════════
// RENDER
// ══════════════════════════════════
function render(){
  const app=document.getElementById("app");
  const sb=syncStatus==="ok"?'<span class="sync-badge ok">●</span>':syncStatus==="pending"?'<span class="sync-badge pending">⟳</span>':'<span class="sync-badge err">✗</span>';

  let h="";

  // ── IDLE ──
  if(!sessionActive){
    h+=`<div class="header"><h1>🧮 Tray Tally ${sb}</h1></div>`;
    // Recent
    if(recentEntries.length){
      h+=`<div class="recent">`;
      recentEntries.forEach(e=>{h+=`<span class="recent-item ${e.type}">${e.value} → ${e.name}</span>`});
      h+=`</div>`;
    }
    // Table view
    h+=renderTable();
    h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-copy" onclick="startSession()"><span style="font-size:30px">🎤</span> COPY</button></div>`;
    h+=`<p class="hint">Say number → tap name. Fast & noise-proof.</p></div>`;
    app.innerHTML=h;return;
  }

  // ── SESSION ACTIVE ──
  h+=`<div class="header"><h1><span class="rec-dot"></span> Tray Tally ${sb}</h1><div style="display:flex;gap:6px">`;
  h+=`<button class="chip" onclick="handleUndo()">↩</button>`;
  h+=`<button class="chip" onclick="inputMode==='voice'?switchToManual():switchToVoice()">${inputMode==="voice"?"⌨️":"🎤"}</button>`;
  h+=`<button class="chip" onclick="setView('table')">📊</button>`;
  h+=`<button class="chip" onclick="setView('log')">📋</button>`;
  h+=`</div></div>`;

  // Recent entries bar
  if(recentEntries.length){
    h+=`<div class="recent">`;
    recentEntries.forEach(e=>{h+=`<span class="recent-item ${e.type}">${e.value}→${e.name}</span>`});
    h+=`</div>`;
  }

  // ── TABLE / LOG views ──
  if(mode==="table"){
    h+=renderTable();
    h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-done" onclick="endSession()">■ DONE</button></div></div>`;
    app.innerHTML=h;return;
  }
  if(mode==="log"){
    h+=`<div class="content"><div class="log-wrap">`;
    if(!logs.length)h+=`<p style="font-size:12px;color:var(--dim)">No activity yet.</p>`;
    logs.forEach(l=>{h+=`<div class="log-entry ${l.type}"><span class="log-time">${l.t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>${l.msg}</div>`});
    h+=`</div></div>`;
    h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-done" onclick="endSession()">■ DONE</button></div></div>`;
    app.innerHTML=h;return;
  }

  // ── LISTENING MODE (voice) ──
  if(mode==="listening"&&inputMode==="voice"){
    h+=`<div class="status-bar"><div class="status-dot" style="background:var(--green);box-shadow:0 0 8px var(--green)"></div><span style="font-size:13px;font-weight:700;color:var(--green)">● Listening — say the number</span></div>`;
    h+=`<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px"><p style="font-size:16px;color:var(--dim);text-align:center;line-height:1.8">Say: <span style="color:var(--accent)">"20"</span> or <span style="color:var(--accent)">"20 rock"</span><br>or <span style="color:var(--orange)">"20 costco"</span> or <span style="color:var(--purple)">"20 lidoff"</span></p></div>`;
    h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-done" onclick="endSession()">■ DONE</button></div></div>`;
    app.innerHTML=h;return;
  }

  // ── PICK NAME (after hearing number via voice) ──
  if(mode==="pickName"&&inputMode==="voice"){
    const tc=heardType==="costco"?"var(--orange)":heardType==="lidoff"?"var(--purple)":"var(--accent)";
    const tl=heardType==="costco"?"COSTCO":heardType==="lidoff"?"LIDOFF":"NORMAL";
    h+=`<div class="heard-box"><span class="heard-number">${heardValue}</span><span class="heard-type ${heardType}">${tl}</span>`;
    h+=`<div class="heard-raw">Heard: "${heardRaw}"</div>`;
    h+=`<div class="heard-wrong"><button class="redo" onclick="redoVoice()">✗ Wrong — redo</button></div></div>`;
    h+=`<div class="name-section"><p class="name-section-title">Tap the name</p><div class="name-grid">`;
    NAMES.forEach(n=>{
      const p=data[n];const act=p.normal.length+p.costco.length+p.lidoff.length>0;
      h+=`<button class="name-btn${act?" has-data":""}" onclick="tapName('${n}')">${n}</button>`;
    });
    h+=`</div></div>`;
    h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-done" onclick="endSession()">■ DONE</button></div></div>`;
    app.innerHTML=h;return;
  }

  // ── MANUAL MODE (number pad + type + name grid) ──
  if(inputMode==="manual"){
    const tc=manualType==="costco"?"var(--orange)":manualType==="lidoff"?"var(--purple)":"var(--accent)";
    const tl=manualType==="costco"?"COSTCO":manualType==="lidoff"?"LIDOFF":"NORMAL";
    h+=`<div class="heard-box"><span class="heard-number">${manualNum||"_"}</span><span class="heard-type ${manualType}">${tl}</span></div>`;

    // Type selector
    h+=`<div style="display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border)">`;
    h+=`<button class="chip${manualType==="normal"?" sel":""}" onclick="tapManualType('normal')" style="flex:1;text-align:center;${manualType==="normal"?"border-color:var(--accent);background:var(--accentDim)":""}">Normal</button>`;
    h+=`<button class="chip${manualType==="costco"?" sel":""}" onclick="tapManualType('costco')" style="flex:1;text-align:center;${manualType==="costco"?"border-color:var(--orange);background:var(--orangeDim)":""}">Costco</button>`;
    h+=`<button class="chip${manualType==="lidoff"?" sel":""}" onclick="tapManualType('lidoff')" style="flex:1;text-align:center;${manualType==="lidoff"?"border-color:var(--purple);background:var(--purpleDim)":""}">LidOff</button>`;
    h+=`</div>`;

    // Numpad
    h+=`<div class="numpad">`;
    for(let i=1;i<=9;i++)h+=`<button onclick="tapNum('${i}')">${i}</button>`;
    h+=`<button onclick="tapClear()" style="color:var(--red)">C</button>`;
    h+=`<button onclick="tapNum('0')">0</button>`;
    h+=`<button onclick="tapBackspace()" style="color:var(--orange)">⌫</button>`;
    h+=`</div>`;

    // Name grid
    h+=`<div class="name-section" style="max-height:180px;overflow:auto"><div class="name-grid">`;
    NAMES.forEach(n=>{h+=`<button class="name-btn" onclick="tapManualName('${n}')">${n}</button>`});
    h+=`</div></div>`;
    h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-done" onclick="endSession()">■ DONE</button></div></div>`;
    app.innerHTML=h;return;
  }

  // fallback
  app.innerHTML=h;
}

function renderTable(){
  let h=`<div class="content"><div class="table-wrap"><table><thead><tr><th class="big" rowspan="2" style="position:sticky;left:0;z-index:5;min-width:68px;background:var(--surface)">Name</th><th class="big" colspan="${MAX_N}" style="color:var(--accent);text-align:center;border-left:2px solid rgba(56,189,248,.13)">Normal</th><th class="big" colspan="6" style="color:var(--orange);text-align:center;border-left:2px solid rgba(251,191,36,.13)">Costco</th><th class="big" colspan="6" style="color:var(--purple);text-align:center;border-left:2px solid rgba(167,139,250,.13)">LidOff</th><th class="big" rowspan="2" style="color:var(--green);text-align:center;border-left:2px solid rgba(74,222,128,.13)">Tot</th></tr><tr>`;
  for(let i=1;i<=MAX_N;i++)h+=`<th class="sub"${i===1?' style="border-left:2px solid rgba(56,189,248,.13)"':''}>${i}</th>`;
  for(let i=1;i<=3;i++)h+=`<th class="sub" style="color:var(--orange);${i===1?'border-left:2px solid rgba(251,191,36,.13)':''}">C${i}</th><th class="sub" style="color:rgba(251,191,36,.4)">cv</th>`;
  for(let i=1;i<=3;i++)h+=`<th class="sub" style="color:var(--purple);${i===1?'border-left:2px solid rgba(167,139,250,.13)':''}">L${i}</th><th class="sub" style="color:rgba(167,139,250,.4)">cv</th>`;
  h+=`</tr></thead><tbody>`;
  NAMES.forEach((name,ri)=>{
    const p=data[name],tot=totalFor(p),act=p.normal.length+p.costco.length+p.lidoff.length>0;
    const bg=ri%2===0?"var(--bg)":"var(--card)";
    h+=`<tr style="background:${ri%2===0?"transparent":"rgba(20,28,43,.27)"}"><td class="nm" style="background:${bg};color:${act?"var(--text)":"var(--dim)"}">${name}</td>`;
    for(let ci=0;ci<MAX_N;ci++){const v=p.normal[ci],hl=lastHL&&lastHL.name===name&&lastHL.sec==="normal"&&lastHL.idx===ci;h+=`<td class="c${hl?" hl":""}"${ci===0?' style="border-left:2px solid rgba(56,189,248,.13)"':''}>${v??""}</td>`}
    for(let ci=0;ci<3;ci++){const v=p.costco[ci],cv=v!=null?cC(v):null,hl=lastHL&&lastHL.name===name&&lastHL.sec==="costco"&&lastHL.idx===ci;h+=`<td class="c${hl?" hlc":""}" style="${ci===0?"border-left:2px solid rgba(251,191,36,.13);":""}${v!=null?"color:var(--orange)":""}">${v??""}</td><td class="c" style="color:${cv!=null?"rgba(251,191,36,.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`}
    for(let ci=0;ci<3;ci++){const v=p.lidoff[ci],cv=v!=null?lC(v):null,hl=lastHL&&lastHL.name===name&&lastHL.sec==="lidoff"&&lastHL.idx===ci;h+=`<td class="c${hl?" hll":""}" style="${ci===0?"border-left:2px solid rgba(167,139,250,.13);":""}${v!=null?"color:var(--purple)":""}">${v??""}</td><td class="c" style="color:${cv!=null?"rgba(167,139,250,.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`}
    h+=`<td class="c" style="font-weight:700;font-size:12px;color:${tot>0?"var(--green)":"var(--dim)"};border-left:2px solid rgba(74,222,128,.13);font-family:'Outfit'">${tot}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}

render();
</script>
</body>
</html>
