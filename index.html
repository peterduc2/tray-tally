<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tray Tally</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--surface:#0c1018;--card:#141c2b;--border:#1e2d44;--accent:#38bdf8;--accentDim:rgba(56,189,248,0.12);--green:#4ade80;--greenDim:rgba(74,222,128,0.15);--red:#fb7185;--redDim:rgba(251,113,133,0.15);--orange:#fbbf24;--orangeDim:rgba(251,191,36,0.12);--purple:#a78bfa;--purpleDim:rgba(167,139,250,0.12);--text:#e4eaf4;--muted:#6e819e;--dim:#3b4a64}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes flash{0%{background:var(--greenDim)}100%{background:transparent}}
.header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite}
.chip{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;min-height:30px}
.recent{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.recent-item{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.recent-item.normal{background:var(--accentDim);color:var(--accent)}
.recent-item.costco{background:var(--orangeDim);color:var(--orange)}
.recent-item.lidoff{background:var(--purpleDim);color:var(--purple)}
.status-bar{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%}
.heard-box{padding:12px 14px;border-bottom:1px solid var(--border);text-align:center;animation:fadeUp .2s;background:var(--card)}
.heard-number{font-size:32px;font-weight:800}
.heard-type{font-size:14px;font-weight:700;margin-left:6px}
.heard-type.normal{color:var(--accent)}.heard-type.costco{color:var(--orange)}.heard-type.lidoff{color:var(--purple)}
.heard-name{font-size:18px;font-weight:700;margin-left:8px}
.heard-raw{font-size:10px;color:var(--dim);margin-top:2px}
.confirm-btns{display:flex;gap:8px;margin-top:8px}
.btn-no{flex:1;padding:14px;border-radius:12px;border:2px solid rgba(251,113,133,.27);background:var(--redDim);color:var(--red);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;min-height:50px}
.btn-yes{flex:1;padding:14px;border-radius:12px;border:2px solid rgba(74,222,128,.27);background:var(--greenDim);color:var(--green);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;min-height:50px}
.name-section{padding:8px 10px;overflow:auto;flex-shrink:1}
.name-section-title{font-size:10px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.name-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.name-btn{padding:12px 6px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;min-height:46px;text-align:center}
.name-btn:active{transform:scale(0.95);background:var(--accentDim);border-color:var(--accent)}
.spell-box{padding:8px 14px;border-bottom:1px solid var(--border);text-align:center}
.spell-letters{font-size:22px;font-weight:800;letter-spacing:3px;color:var(--accent);min-height:30px}
.spell-hint{font-size:9px;color:var(--dim)}
.content{flex:1;overflow:auto}
.table-wrap{padding:6px;overflow:auto}
table{border-collapse:separate;border-spacing:0;font-size:10px;font-family:'IBM Plex Mono',monospace;min-width:100%}
th.big{padding:6px 4px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--muted);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0;z-index:3;white-space:nowrap}
th.sub{padding:4px 3px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--dim);font-weight:600;font-size:8px;text-align:center;position:sticky;top:22px;z-index:3;white-space:nowrap}
td.nm{padding:6px 8px;border-bottom:1px solid rgba(30,45,68,.15);font-weight:700;font-size:11px;font-family:'Outfit';white-space:nowrap;position:sticky;left:0;z-index:2;border-right:1px solid var(--border)}
td.c{padding:5px 6px;border-bottom:1px solid rgba(30,45,68,.12);text-align:center;min-width:28px;font-size:11px}
td.c.hl{background:var(--accentDim);animation:pop .3s}
td.c.hlc{background:var(--orangeDim);animation:pop .3s}
td.c.hll{background:var(--purpleDim);animation:pop .3s}
.log-wrap{padding:10px 14px}
.log-entry{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(30,45,68,.07);font-family:'IBM Plex Mono',monospace}
.log-entry.error{color:var(--red)}.log-entry.success{color:var(--green)}.log-entry.info{color:var(--muted)}
.log-time{opacity:.3;margin-right:6px;font-size:9px}
.bottom{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.main-btn-wrap{padding:12px 16px 16px;display:flex;justify-content:center}
.btn-copy{width:100%;max-width:340px;padding:20px;border-radius:20px;border:none;background:linear-gradient(145deg,var(--accent),#6366f1);color:#fff;font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 30px rgba(56,189,248,.3);display:flex;align-items:center;justify-content:center;gap:12px}
.btn-done{width:100%;max-width:340px;padding:20px;border-radius:20px;border:2px solid rgba(251,113,133,.27);background:var(--redDim);color:var(--red);font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:12px}
.hint{text-align:center;font-size:10px;color:var(--dim);padding:0 14px 10px}
.sync-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:6px}
.sync-badge.ok{background:rgba(74,222,128,.12);color:var(--green)}
.sync-badge.pending{background:rgba(251,191,36,.12);color:var(--orange)}
.sync-badge.err{background:rgba(251,113,133,.12);color:var(--red)}
.numpad{padding:8px 10px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.numpad button{padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:18px;font-weight:700;cursor:pointer;font-family:inherit}
.numpad button:active{background:var(--accentDim)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycby-JkwiebFtp_R9q4oR_wDBygB_do20yrfVdHXbCG8yXtSfyjKPjuuveGSFEDEwjO5RcA/exec";
const NAMES=["David","Mark","Tala","Huong","Paulo","Bob","Dung","Lan","Lien","Hoi","Son","Chien Ito","Hong","Tu","Nghia","Vinh","Kevin","Ninh","Phat","Linh","Dieu","Amy","Thi"];
const NL=NAMES.map(n=>n.toLowerCase());
const MAX_N=15,MAX_C=3,MAX_L=3;
const cC=v=>Math.round(v*14/12),lC=v=>Math.round(v*13/17);

let data={};NAMES.forEach(n=>{data[n]={normal:[],costco:[],lidoff:[]}});
let sessionActive=false;
// modes: idle,listening,confirm,pickName,spell,table,log,manual
let mode="idle";
let pendingValue=null,pendingType="normal",pendingName=null,pendingRaw="";
let spelledName="",spellTimer=null;
let manualNum="",manualType="normal";
let logs=[],recentEntries=[],lastHL=null,rec=null,syncStatus="ok";

// ── Sheet ──
async function sendToSheet(a,p){syncStatus="pending";render();try{const u=new URL(SCRIPT_URL);u.searchParams.set("action",a);for(const[k,v]of Object.entries(p))u.searchParams.set(k,v);const r=await(await fetch(u.toString(),{redirect:"follow"})).json();syncStatus=r.error?"error":"ok";render();return r}catch(e){syncStatus="error";render();return{error:e.message}}}

// ── Numbers (fuzzy) ──
const WN={zero:0,one:1,won:1,two:2,to:2,too:2,three:3,tree:3,free:3,four:4,five:5,hive:5,six:6,seven:7,eight:8,ate:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,thirty:30,fourteen:14,forty:40,fifteen:15,fifty:50,sixteen:16,sixty:60,seventeen:17,seventy:70,eighteen:18,eighty:80,nineteen:19,ninety:90,twenty:20,hundred:100};
function w2n(s){const d=parseInt(s);if(!isNaN(d))return d;const ws=s.toLowerCase().replace(/-/g," ").replace(/\b(uh|um|a|the|and)\b/g,"").trim().split(/\s+/).filter(Boolean);let c=0;for(const w of ws){if(WN[w]!==undefined){if(w==="hundred")c=(c||1)*100;else c+=WN[w]}}return c}
function lev(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));return d[m][n]}

// ── Name aliases ──
const NA={"david":["david","davit","dave","daveed"],"mark":["mark","marc","marks","mock"],"tala":["tala","talla","tyler","tara","tayla"],"huong":["huong","hong","hung","huang","hwong","fuong"],"paulo":["paulo","pablo","polo","paul"],"bob":["bob","bop","rob"],"dung":["dung","dong","doong","young","jung","yung"],"lan":["lan","lynn","lam","lon","lang"],"lien":["lien","lean","leon","leen","lin","lian"],"hoi":["hoi","hoy","hoe","hoey","hey"],"son":["son","sun","sung","sewn","zone"],"chien ito":["chien ito","chien","chen ito","chen","chicken ito","jean ito","chain ito"],"hong":["hong","hung","honk"],"tu":["tu","too","to","tue","tew"],"nghia":["nghia","nia","nea","niya","knee ya","knee ah"],"vinh":["vinh","vin","veen","vine","win","winn"],"kevin":["kevin","kelvin","gavin","kev"],"ninh":["ninh","nin","ning","neen","nine","ninn"],"phat":["phat","fat","fatt","pot","pat","fut"],"linh":["linh","lin","ling","lynn","link"],"dieu":["dieu","dew","due","dio","dee you"],"amy":["amy","amee","aimee","ami"],"thi":["thi","tea","thee","ti","tee","fee"]};

function findName(sp){
  const lo=sp.toLowerCase().trim().replace(/\b(uh|um|a|the|and|for)\b/g,"").trim();
  if(!lo)return{name:null,conf:0};
  for(let i=0;i<NAMES.length;i++)if(lo===NL[i])return{name:NAMES[i],conf:100};
  for(const[key,aliases]of Object.entries(NA)){const rn=NAMES.find(n=>n.toLowerCase()===key);if(!rn)continue;for(const a of aliases)if(lo===a||lo.includes(a))return{name:rn,conf:96}}
  const sorted=[...NAMES].sort((a,b)=>b.length-a.length);
  for(const n of sorted)if(lo.includes(n.toLowerCase()))return{name:n,conf:95};
  let bs=Infinity,bi=0;
  for(let i=0;i<NAMES.length;i++){const aliases=NA[NL[i]]||[NL[i]];for(const a of aliases){const d=lev(lo,a);if(d<bs){bs=d;bi=i}}}
  const ml=Math.max(lo.length,NL[bi].length||1);
  return{name:NAMES[bi],conf:Math.round((1-bs/ml)*100)}
}

// ── Type detection ──
const NORMAL_W=["rock","rocks","rok","roc","pacific","pacifica","specific","pasific","normal"];
const COSTCO_W=["costco","cosco","cost co","cosko","costko","casco","koscoe","costgo","cisco","corso","kosco"];
const LIDOFF_W=["lid off","lidoff","lit off","lit of","lid of","lead off","led off","led of","light off","light of","lift off","lip off","lip of","little off","lit up","lid on","lit on"];

function detectType(text){
  const lo=text.toLowerCase();
  for(const w of COSTCO_W)if(lo.includes(w))return{type:"costco",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  const sl=[...LIDOFF_W].sort((a,b)=>b.length-a.length);
  for(const w of sl)if(lo.includes(w))return{type:"lidoff",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  for(const w of NORMAL_W)if(lo.includes(w))return{type:"normal",cleaned:lo.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"g"),"").trim()};
  return{type:"normal",cleaned:lo}
}

function parseFullCmd(text){
  const{type,cleaned}=detectType(text);
  let cl=cleaned.replace(/\b(for)\b/g,"").trim();
  // Extract number from start
  let numStr="",rest=cl;
  const nm=cl.match(/^(\d+)\s*(.*)/);
  if(nm){numStr=nm[1];rest=nm[2].trim()}
  else{const ws=cl.split(/\s+/);let nw=[],i=0;while(i<ws.length&&WN[ws[i]]!==undefined){nw.push(ws[i]);i++}if(nw.length){numStr=nw.join(" ");rest=ws.slice(i).join(" ").trim()}}
  if(!numStr)return null;
  const value=w2n(numStr);
  if(value<=0)return null;
  // Try to find name in rest
  if(!rest)return{value,type,name:null,conf:0};
  const{name,conf}=findName(rest);
  return{value,type,name,conf}
}

// ── Spell matching ──
function matchSpelling(sp){
  const lo=sp.toLowerCase().replace(/[^a-z]/g,"");
  if(!lo)return null;
  for(let i=0;i<NAMES.length;i++)if(NL[i].replace(/\s/g,"")===lo)return NAMES[i];
  for(let i=0;i<NAMES.length;i++)if(NL[i].replace(/\s/g,"").startsWith(lo)&&lo.length>=2)return NAMES[i];
  let bs=Infinity,bi=0;
  for(let i=0;i<NAMES.length;i++){const d=lev(lo,NL[i].replace(/\s/g,""));if(d<bs){bs=d;bi=i}}
  if(bs<=2)return NAMES[bi];
  return null;
}

// ── TTS — fast ──
function speak(text){return new Promise(r=>{speechSynthesis.cancel();setTimeout(()=>{const u=new SpeechSynthesisUtterance(text);u.rate=1.3;u.volume=1;u.pitch=1.1;u.lang="en-US";u.onend=()=>setTimeout(r,100);u.onerror=()=>setTimeout(r,100);speechSynthesis.speak(u)},50)})}
function vibrate(ms){try{navigator.vibrate(ms)}catch{}}
function addLog(msg,type="info"){logs.push({msg,type,t:new Date()});if(logs.length>60)logs=logs.slice(-60);render()}
function totalFor(p){return p.normal.reduce((a,b)=>a+b,0)+p.costco.reduce((a,b)=>a+cC(b),0)+p.lidoff.reduce((a,b)=>a+lC(b),0)}

// ── Mic ──
function startListening(){
  if(!sessionActive)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addLog("Use Safari!","error");return}
  try{rec?.abort()}catch{}
  rec=new SR();rec.continuous=false;rec.interimResults=false;rec.lang="en-US";
  rec.onresult=(e)=>{
    const t=(e.results[0]?.[0]?.transcript||"").trim();
    if(t.length<2)return;
    addLog('🗣 "'+t+'"',"info");
    handleVoice(t);
  };
  rec.onerror=(e)=>{if(e.error==="not-allowed"){sessionActive=false;mode="idle";addLog("Mic blocked","error");render()}};
  rec.onend=()=>{if(sessionActive&&(mode==="listening"||mode==="confirm"||mode==="spell"))setTimeout(()=>{if(sessionActive)startListening()},200)};
  try{rec.start()}catch{}
}

// ── Voice handler ──
async function handleVoice(text){
  const lo=text.toLowerCase().trim();

  // ── CONFIRM mode ──
  if(mode==="confirm"){
    if(/yes|yep|yeah|yup|ok|sure|correct|confirm/.test(lo)){doConfirm();return}
    if(/no|nope|nah|wrong|cancel/.test(lo)){doDeny();return}
    return;
  }

  // ── SPELL mode ──
  if(mode==="spell"){
    if(/cancel|stop/.test(lo)){cancelSpell();return}
    const letters=lo.replace(/[^a-z]/g,"");
    if(letters){
      spelledName+=letters;
      addLog("Spelling: "+spelledName.toUpperCase(),"info");
      render();
      // Reset 3-second timer
      clearTimeout(spellTimer);
      spellTimer=setTimeout(()=>finishSpelling(),3000);
    }
    return;
  }

  // ── LISTENING mode: parse full command ──
  if(mode==="listening"){
    const result=parseFullCmd(text);
    if(!result){addLog("Unclear — try again","error");return}

    pendingValue=result.value;
    pendingType=result.type;
    pendingRaw=text;

    // Name confident? → go to confirm
    if(result.name&&result.conf>=80){
      pendingName=result.name;
      mode="confirm";render();
      const tl=result.type==="costco"?" costco":result.type==="lidoff"?" lid off":"";
      await speak(result.value+tl+" "+result.name+". Yes?");
      return;
    }

    // Name not confident or no name → show tap grid
    pendingName=null;
    mode="pickName";
    try{rec?.abort()}catch{}
    render();
    vibrate(50);
    const tl=result.type==="costco"?" costco":result.type==="lidoff"?" lid off":"";
    await speak(result.value+tl+". Tap name.");
    return;
  }
}

// ── Confirm / Deny ──
async function doConfirm(){
  if(!pendingName||!pendingValue)return;
  addEntry(pendingValue,pendingType,pendingName);
  pendingValue=null;pendingName=null;mode="listening";render();
  await speak("Done.");
}
async function doDeny(){pendingValue=null;pendingName=null;mode="listening";render();await speak("Again.")}

// ── Tap name (from grid) ──
async function tapName(name){
  if(!pendingValue)return;
  addEntry(pendingValue,pendingType,name);
  pendingValue=null;pendingName=null;mode="listening";render();
  vibrate([50,30,50]);
  await speak("Done.");
  startListening();
}

// ── Spell flow ──
function startSpell(){
  spelledName="";mode="spell";render();
  clearTimeout(spellTimer);
  startListening();
  speak("Spell the name.");
}
function cancelSpell(){clearTimeout(spellTimer);spelledName="";mode="listening";render();startListening()}
async function finishSpelling(){
  clearTimeout(spellTimer);
  const matched=matchSpelling(spelledName);
  if(matched){
    addLog("Spelled → "+matched,"info");
    addEntry(pendingValue,pendingType,matched);
    spelledName="";pendingValue=null;mode="listening";render();
    vibrate([50,30,50]);
    await speak(matched+". Done.");
    startListening();
  }else{
    addLog("No match: "+spelledName,"error");
    spelledName="";mode="pickName";render();
    await speak("No match. Tap the name.");
  }
}

// ── Add entry ──
function addEntry(value,type,name){
  const p=data[name];if(!p)return;
  if(type==="normal"){if(p.normal.length>=MAX_N){addLog(name+": full","error");return}p.normal.push(value);lastHL={name,sec:"normal",idx:p.normal.length-1}}
  else if(type==="costco"){if(p.costco.length>=MAX_C){addLog(name+": costco full","error");return}p.costco.push(value);lastHL={name,sec:"costco",idx:p.costco.length-1}}
  else if(type==="lidoff"){if(p.lidoff.length>=MAX_L){addLog(name+": lidoff full","error");return}p.lidoff.push(value);lastHL={name,sec:"lidoff",idx:p.lidoff.length-1}}
  const tl=type==="costco"?" costco":type==="lidoff"?" lidoff":"";
  recentEntries.unshift({value,type,name,t:new Date()});
  if(recentEntries.length>5)recentEntries=recentEntries.slice(0,5);
  addLog("✓ "+value+tl+" → "+name+" ("+totalFor(data[name])+")","success");
  render();setTimeout(()=>{lastHL=null;render()},2000);
  sendToSheet("add",{name,value,type});
}

// ── Manual mode ──
function tapNum(n){manualNum+=n;render()}
function tapClear(){manualNum="";render()}
function tapBack(){manualNum=manualNum.slice(0,-1);render()}
function tapMType(t){manualType=t;render()}
function tapManualName(name){
  const val=parseInt(manualNum);if(!val){addLog("Enter number","error");return}
  addEntry(val,manualType,name);manualNum="";render();vibrate([50,30,50]);
}

// ── Session ──
async function startSession(){sessionActive=true;mode="listening";addLog("Session started","success");render();await speak("Ready.");startListening()}
async function endSession(){sessionActive=false;try{rec?.abort()}catch{}clearTimeout(spellTimer);mode="idle";pendingValue=null;pendingName=null;spelledName="";addLog("Session ended","info");render();await speak("Done.")}
function handleUndo(){
  if(!recentEntries.length)return;
  const e=recentEntries.shift();const p=data[e.name];if(!p)return;
  if(e.type==="normal")p.normal.pop();else if(e.type==="costco")p.costco.pop();else if(e.type==="lidoff")p.lidoff.pop();
  addLog("↩ "+e.name,"info");render();sendToSheet("undo",{name:e.name,type:e.type});
}
function switchMode(){if(mode==="manual"){mode="listening";startListening()}else{mode="manual";try{rec?.abort()}catch{}}render()}
function setView(v){mode=v;render()}

// ══════════════════════
// RENDER
// ══════════════════════
function render(){
  const app=document.getElementById("app");
  const sb=syncStatus==="ok"?'<span class="sync-badge ok">●</span>':syncStatus==="pending"?'<span class="sync-badge pending">⟳</span>':'<span class="sync-badge err">✗</span>';
  let h="";

  // ── IDLE ──
  if(!sessionActive){
    h+=`<div class="header"><h1>🧮 Tray Tally ${sb}</h1></div>`;
    if(recentEntries.length){h+=`<div class="recent">`;recentEntries.forEach(e=>{h+=`<span class="recent-item ${e.type}">${e.value}→${e.name}</span>`});h+=`</div>`}
    h+=renderTable();
    h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-copy" onclick="startSession()"><span style="font-size:28px">🎤</span> COPY</button></div><p class="hint">Say number+name, or say number then tap name</p></div>`;
    app.innerHTML=h;return;
  }

  // ── HEADER (session) ──
  h+=`<div class="header"><h1><span class="rec-dot"></span> Tray Tally ${sb}</h1><div style="display:flex;gap:5px">`;
  h+=`<button class="chip" onclick="handleUndo()">↩</button>`;
  h+=`<button class="chip" onclick="switchMode()">${mode==="manual"?"🎤":"⌨️"}</button>`;
  h+=`<button class="chip" onclick="setView('table')">📊</button>`;
  h+=`<button class="chip" onclick="setView('log')">📋</button>`;
  h+=`</div></div>`;
  if(recentEntries.length){h+=`<div class="recent">`;recentEntries.forEach(e=>{h+=`<span class="recent-item ${e.type}">${e.value}→${e.name}</span>`});h+=`</div>`}

  // ── TABLE / LOG ──
  if(mode==="table"){h+=renderTable();h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-done" onclick="endSession()">■ DONE</button></div></div>`;app.innerHTML=h;return}
  if(mode==="log"){h+=`<div class="content"><div class="log-wrap">`;logs.forEach(l=>{h+=`<div class="log-entry ${l.type}"><span class="log-time">${l.t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>${l.msg}</div>`});h+=`</div></div><div class="bottom"><div class="main-btn-wrap"><button class="btn-done" onclick="endSession()">■ DONE</button></div></div>`;app.innerHTML=h;return}

  // ── LISTENING ──
  if(mode==="listening"){
    h+=`<div class="status-bar"><div class="status-dot" style="background:var(--green);box-shadow:0 0 8px var(--green)"></div><span style="font-size:13px;font-weight:700;color:var(--green)">● Listening…</span></div>`;
    h+=`<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:16px"><p style="font-size:15px;color:var(--dim);text-align:center;line-height:1.8"><span style="color:var(--accent)">"20 David"</span> · <span style="color:var(--accent)">"20 rock David"</span><br><span style="color:var(--orange)">"20 costco Mark"</span> · <span style="color:var(--purple)">"15 lidoff Huong"</span><br><span style="color:var(--dim);font-size:12px">or just say the number, then tap name</span></p></div>`;
  }

  // ── CONFIRM (name was confident) ──
  if(mode==="confirm"&&pendingName){
    const tc=pendingType==="costco"?"var(--orange)":pendingType==="lidoff"?"var(--purple)":"var(--accent)";
    const tl=pendingType==="costco"?"COSTCO":pendingType==="lidoff"?"LIDOFF":"";
    h+=`<div class="heard-box"><span class="heard-number" style="color:${tc}">${pendingValue}</span>`;
    if(tl)h+=`<span class="heard-type ${pendingType}">${tl}</span>`;
    h+=`<span class="heard-name">→ ${pendingName}</span>`;
    h+=`<div class="heard-raw">"${pendingRaw}"</div>`;
    h+=`<div class="confirm-btns"><button class="btn-no" onclick="doDeny()">✗ NO</button><button class="btn-yes" onclick="doConfirm()">✓ YES</button></div>`;
    h+=`<p style="font-size:9px;color:var(--dim);margin-top:4px">Or say yes/no</p></div>`;
    h+=`<div style="flex:1"></div>`;
  }

  // ── PICK NAME (name was unsure) ──
  if(mode==="pickName"){
    const tc=pendingType==="costco"?"var(--orange)":pendingType==="lidoff"?"var(--purple)":"var(--accent)";
    const tl=pendingType==="costco"?"COSTCO":pendingType==="lidoff"?"LIDOFF":"";
    h+=`<div class="heard-box"><span class="heard-number" style="color:${tc}">${pendingValue}</span>`;
    if(tl)h+=`<span class="heard-type ${pendingType}">${tl}</span>`;
    h+=`<div class="heard-raw">"${pendingRaw}"</div>`;
    h+=`<div style="margin-top:6px;display:flex;gap:6px;justify-content:center"><button class="chip" onclick="startSpell()" style="color:var(--purple);border-color:rgba(167,139,250,.3)">🔤 Spell</button><button class="chip" onclick="cancelPick()" style="color:var(--red);border-color:rgba(251,113,133,.3)">✗</button></div></div>`;
    h+=`<div class="name-section"><p class="name-section-title">Tap the name</p><div class="name-grid">`;
    NAMES.forEach(n=>{h+=`<button class="name-btn" onclick="tapName('${n}')">${n}</button>`});
    h+=`</div></div>`;
  }

  // ── SPELL mode ──
  if(mode==="spell"){
    const tc=pendingType==="costco"?"var(--orange)":pendingType==="lidoff"?"var(--purple)":"var(--accent)";
    h+=`<div class="heard-box"><span class="heard-number" style="color:${tc}">${pendingValue}</span></div>`;
    h+=`<div class="spell-box"><div class="spell-letters">${spelledName?spelledName.toUpperCase().split("").join(" "):"…"}</div>`;
    const matched=spelledName?matchSpelling(spelledName):null;
    if(matched)h+=`<div style="font-size:14px;color:var(--green);font-weight:700;margin:4px 0">→ ${matched}?</div>`;
    h+=`<div class="spell-hint">Say letters · Auto-confirms in 3 sec · Or tap name below</div></div>`;
    h+=`<div class="name-section"><div class="name-grid">`;
    NAMES.forEach(n=>{h+=`<button class="name-btn" onclick="tapName('${n}')">${n}</button>`});
    h+=`</div></div>`;
  }

  // ── MANUAL ──
  if(mode==="manual"){
    const tc=manualType==="costco"?"var(--orange)":manualType==="lidoff"?"var(--purple)":"var(--accent)";
    const tl=manualType==="costco"?"COSTCO":manualType==="lidoff"?"LIDOFF":"NORMAL";
    h+=`<div class="heard-box"><span class="heard-number" style="color:${tc}">${manualNum||"_"}</span><span class="heard-type ${manualType}">${tl}</span></div>`;
    h+=`<div style="display:flex;gap:5px;padding:5px 10px;border-bottom:1px solid var(--border)">`;
    ["normal","costco","lidoff"].forEach(t=>{
      const c=t==="costco"?"var(--orange)":t==="lidoff"?"var(--purple)":"var(--accent)";
      h+=`<button class="chip" onclick="tapMType('${t}')" style="flex:1;text-align:center;${manualType===t?"border-color:"+c+";background:rgba(56,189,248,.08)":""}">${t==="normal"?"Normal":t==="costco"?"Costco":"LidOff"}</button>`;
    });
    h+=`</div>`;
    h+=`<div class="numpad">`;
    for(let i=1;i<=9;i++)h+=`<button onclick="tapNum('${i}')">${i}</button>`;
    h+=`<button onclick="tapClear()" style="color:var(--red)">C</button><button onclick="tapNum('0')">0</button><button onclick="tapBack()" style="color:var(--orange)">⌫</button>`;
    h+=`</div>`;
    h+=`<div class="name-section" style="max-height:160px"><div class="name-grid">`;
    NAMES.forEach(n=>{h+=`<button class="name-btn" onclick="tapManualName('${n}')">${n}</button>`});
    h+=`</div></div>`;
  }

  // ── DONE button ──
  h+=`<div class="bottom"><div class="main-btn-wrap"><button class="btn-done" onclick="endSession()">■ DONE</button></div></div>`;
  app.innerHTML=h;
}

function cancelPick(){pendingValue=null;mode="listening";render();startListening()}

function renderTable(){
  let h=`<div class="content"><div class="table-wrap"><table><thead><tr><th class="big" rowspan="2" style="position:sticky;left:0;z-index:5;min-width:68px;background:var(--surface)">Name</th><th class="big" colspan="${MAX_N}" style="color:var(--accent);text-align:center;border-left:2px solid rgba(56,189,248,.13)">Normal</th><th class="big" colspan="6" style="color:var(--orange);text-align:center;border-left:2px solid rgba(251,191,36,.13)">Costco</th><th class="big" colspan="6" style="color:var(--purple);text-align:center;border-left:2px solid rgba(167,139,250,.13)">LidOff</th><th class="big" rowspan="2" style="color:var(--green);text-align:center;border-left:2px solid rgba(74,222,128,.13)">Tot</th></tr><tr>`;
  for(let i=1;i<=MAX_N;i++)h+=`<th class="sub"${i===1?' style="border-left:2px solid rgba(56,189,248,.13)"':''}>${i}</th>`;
  for(let i=1;i<=3;i++)h+=`<th class="sub" style="color:var(--orange);${i===1?'border-left:2px solid rgba(251,191,36,.13)':''}">C${i}</th><th class="sub" style="color:rgba(251,191,36,.4)">cv</th>`;
  for(let i=1;i<=3;i++)h+=`<th class="sub" style="color:var(--purple);${i===1?'border-left:2px solid rgba(167,139,250,.13)':''}">L${i}</th><th class="sub" style="color:rgba(167,139,250,.4)">cv</th>`;
  h+=`</tr></thead><tbody>`;
  NAMES.forEach((name,ri)=>{
    const p=data[name],tot=totalFor(p),act=p.normal.length+p.costco.length+p.lidoff.length>0;
    const bg=ri%2===0?"var(--bg)":"var(--card)";
    h+=`<tr style="background:${ri%2===0?"transparent":"rgba(20,28,43,.27)"}"><td class="nm" style="background:${bg};color:${act?"var(--text)":"var(--dim)"}">${name}</td>`;
    for(let ci=0;ci<MAX_N;ci++){const v=p.normal[ci],hl=lastHL&&lastHL.name===name&&lastHL.sec==="normal"&&lastHL.idx===ci;h+=`<td class="c${hl?" hl":""}"${ci===0?' style="border-left:2px solid rgba(56,189,248,.13)"':''}>${v??""}</td>`}
    for(let ci=0;ci<3;ci++){const v=p.costco[ci],cv=v!=null?cC(v):null,hl=lastHL&&lastHL.name===name&&lastHL.sec==="costco"&&lastHL.idx===ci;h+=`<td class="c${hl?" hlc":""}" style="${ci===0?"border-left:2px solid rgba(251,191,36,.13);":""}${v!=null?"color:var(--orange)":""}">${v??""}</td><td class="c" style="color:${cv!=null?"rgba(251,191,36,.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`}
    for(let ci=0;ci<3;ci++){const v=p.lidoff[ci],cv=v!=null?lC(v):null,hl=lastHL&&lastHL.name===name&&lastHL.sec==="lidoff"&&lastHL.idx===ci;h+=`<td class="c${hl?" hll":""}" style="${ci===0?"border-left:2px solid rgba(167,139,250,.13);":""}${v!=null?"color:var(--purple)":""}">${v??""}</td><td class="c" style="color:${cv!=null?"rgba(167,139,250,.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`}
    h+=`<td class="c" style="font-weight:700;font-size:12px;color:${tot>0?"var(--green)":"var(--dim)"};border-left:2px solid rgba(74,222,128,.13);font-family:'Outfit'">${tot}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}
render();
</script>
</body>
</html>
