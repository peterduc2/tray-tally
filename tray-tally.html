<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tray Tally</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060a10;--surface:#0c1018;--card:#141c2b;--border:#1e2d44;
  --accent:#38bdf8;--accentDim:rgba(56,189,248,0.12);
  --green:#4ade80;--greenDim:rgba(74,222,128,0.15);
  --red:#fb7185;--redDim:rgba(251,113,133,0.15);
  --orange:#fbbf24;--orangeDim:rgba(251,191,36,0.12);
  --purple:#a78bfa;--purpleDim:rgba(167,139,250,0.12);
  --text:#e4eaf4;--muted:#6e819e;--dim:#3b4a64;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(251,113,133,0.5)}100%{box-shadow:0 0 0 30px rgba(251,113,133,0)}}

.header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite}
.chip{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;min-height:30px}
.status-bar{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:7px;border:none;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;background:transparent;color:var(--dim);border-bottom:2px solid transparent}
.tab.active{background:var(--card);color:var(--text);border-bottom-color:var(--accent)}
.content{flex:1;overflow:auto}
.table-wrap{padding:6px;overflow:auto}
table{border-collapse:separate;border-spacing:0;font-size:10px;font-family:'IBM Plex Mono',monospace;min-width:100%}
th.big{padding:6px 4px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--muted);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:0.06em;position:sticky;top:0;z-index:3;white-space:nowrap}
th.sub{padding:4px 3px;background:var(--surface);border-bottom:2px solid var(--border);color:var(--dim);font-weight:600;font-size:8px;text-align:center;position:sticky;top:22px;z-index:3;white-space:nowrap}
td.name{padding:6px 8px;border-bottom:1px solid rgba(30,45,68,0.15);font-weight:700;font-size:11px;font-family:'Outfit';white-space:nowrap;position:sticky;left:0;z-index:2;border-right:1px solid var(--border)}
td.cell{padding:5px 6px;border-bottom:1px solid rgba(30,45,68,0.12);text-align:center;min-width:28px;font-size:11px}
td.cell.hl{background:var(--accentDim);animation:pop 0.3s}
td.cell.hl-c{background:var(--orangeDim);animation:pop 0.3s}
td.cell.hl-l{background:var(--purpleDim);animation:pop 0.3s}
.log-wrap{padding:10px 14px}
.log-entry{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(30,45,68,0.07);font-family:'IBM Plex Mono',monospace}
.log-entry.error{color:var(--red)}.log-entry.success{color:var(--green)}.log-entry.info{color:var(--muted)}
.log-time{opacity:0.3;margin-right:6px;font-size:9px}

.bottom{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.transcript{padding:8px 14px;border-bottom:1px solid var(--border);animation:fadeUp 0.2s}
.transcript p{font-size:14px;font-style:italic;color:var(--muted)}
.confirm-box{padding:10px 14px;border-bottom:1px solid var(--border);text-align:center;animation:fadeUp 0.3s}
.confirm-val{font-size:20px;font-weight:800}
.confirm-hint{margin-top:4px;font-size:11px;color:var(--orange)}
.name-picker{padding:10px 14px;border-bottom:1px solid var(--border);animation:fadeUp 0.3s}
.name-picker-title{margin-bottom:8px;font-size:13px;font-weight:700;color:var(--purple);text-align:center}
.name-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-height:160px;overflow:auto}
.name-btn{padding:9px 13px;border-radius:18px;border:1.5px solid rgba(167,139,250,0.27);background:var(--purpleDim);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;min-height:40px}
.cancel-btn{width:100%;margin-top:8px;padding:10px;border-radius:10px;border:1px solid rgba(251,113,133,0.2);background:var(--redDim);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.main-btn-wrap{padding:14px 16px 20px;display:flex;justify-content:center}
.btn-copy{width:100%;max-width:340px;padding:22px;border-radius:20px;border:none;background:linear-gradient(145deg,var(--accent),#6366f1);color:#fff;font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 30px rgba(56,189,248,0.3);display:flex;align-items:center;justify-content:center;gap:12px}
.btn-done{width:100%;max-width:340px;padding:22px;border-radius:20px;border:2px solid rgba(251,113,133,0.27);background:var(--redDim);color:var(--red);font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 30px rgba(251,113,133,0.15);display:flex;align-items:center;justify-content:center;gap:12px}
.hint{text-align:center;font-size:10px;color:var(--dim);padding:0 14px 12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
// TRAY TALLY — Self-contained voice app
// ═══════════════════════════════════════════

const NAMES=["David","Mark","Tala","Huong","Paulo","Bob","Dung","Lan","Lien","Hoi","Son","Chien Ito","Hong","Tu","Nghia","Vinh","Kevin","Ninh","Phat","Linh","Dieu","Amy","Thi"];
const NAMES_LOWER=NAMES.map(n=>n.toLowerCase());
const MAX_N=15,MAX_C=3,MAX_L=3;
const cConv=v=>Math.round(v*14/12);
const lConv=v=>Math.round(v*13/17);

// State
let data={};NAMES.forEach(n=>{data[n]={normal:[],costco:[],lidoff:[]}});
let sessionActive=false,status="idle",pendingCmd=null,transcript="",logs=[],lastHL=null,viewTab="table";
let rec=null;

// ── Parser ──
const WNUMS={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90,hundred:100};

function w2n(s){const d=parseInt(s);if(!isNaN(d))return d;const ws=s.toLowerCase().replace(/-/g," ").split(/\s+/);let c=0;for(const w of ws){if(WNUMS[w]!==undefined){if(w==="hundred")c=(c||1)*100;else c+=WNUMS[w]}}return c}

function lev(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));return dp[m][n]}

function findName(sp){const lo=sp.toLowerCase().trim();for(let i=0;i<NAMES.length;i++)if(lo===NAMES_LOWER[i])return{name:NAMES[i],conf:100};for(let i=0;i<NAMES.length;i++)if(lo.includes(NAMES_LOWER[i]))return{name:NAMES[i],conf:95};let bs=Infinity,bi=0;for(let i=0;i<NAMES.length;i++){const d=lev(lo,NAMES_LOWER[i]);if(d<bs){bs=d;bi=i}}const ml=Math.max(lo.length,NAMES_LOWER[bi].length||1);return{name:NAMES[bi],conf:Math.round((1-bs/ml)*100)}}

function parseCmd(text){const lo=text.toLowerCase().trim();let type="normal",cl=lo;if(cl.includes("costco")){type="costco";cl=cl.replace(/costco/g,"").trim()}else if(/lid\s*off|lidoff|lead[\s-]*off/.test(cl)){type="lidoff";cl=cl.replace(/lid\s*off|lidoff|lead[\s-]*off/g,"").trim()}const fi=cl.indexOf(" for ");if(fi===-1)return null;const np=cl.substring(0,fi).trim(),namep=cl.substring(fi+5).trim();if(!np||!namep)return null;const val=w2n(np);if(val===0&&!np.includes("0")&&!np.includes("zero"))return null;const{name,conf}=findName(namep);return{type,value:val,name,nameConfidence:conf}}

// ── TTS ──
function speak(text){return new Promise(r=>{speechSynthesis.cancel();setTimeout(()=>{const u=new SpeechSynthesisUtterance(text);u.rate=1.05;u.lang="en-US";u.onend=()=>setTimeout(r,200);u.onerror=()=>setTimeout(r,200);speechSynthesis.speak(u)},100)})}

// ── Logging ──
function addLog(msg,type="info"){logs.push({msg,type,t:new Date()});if(logs.length>50)logs=logs.slice(-50);render()}

function totalFor(p){return p.normal.reduce((a,b)=>a+b,0)+p.costco.reduce((a,b)=>a+cConv(b),0)+p.lidoff.reduce((a,b)=>a+lConv(b),0)}

// ── Mic ──
function startListening(){
  if(!sessionActive)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addLog("SpeechRecognition not available — use Safari!","error");return}
  try{rec?.abort()}catch{}
  rec=new SR();
  rec.continuous=false;
  rec.interimResults=true;
  rec.lang="en-US";
  rec.onstart=()=>{if(status!=="confirm"&&status!=="namePick"){status="listening";render()}};
  rec.onresult=(e)=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join("");
    transcript=t;render();
    if(e.results[0]?.isFinal)handleSpeech(t.trim());
  };
  rec.onerror=(e)=>{
    if(e.error!=="no-speech"&&e.error!=="aborted"){
      addLog("Mic error: "+e.error,"error");
      // Don't spam restart on not-allowed
      if(e.error==="not-allowed"){sessionActive=false;status="idle";render();return}
    }
  };
  rec.onend=()=>{
    if(sessionActive&&(status==="listening"||status==="idle")){
      setTimeout(()=>{if(sessionActive)startListening()},300);
    }
  };
  try{rec.start()}catch(e){addLog("Mic start failed: "+e.message,"error")}
}

function restartListening(){setTimeout(()=>{if(sessionActive){status="listening";render();startListening()}},400)}

// ── Handle speech ──
async function handleSpeech(text){
  if(!text)return;
  const lo=text.toLowerCase();

  if(status==="confirm"){
    if(lo.includes("confirm")||lo.includes("yes")||lo.includes("correct")){
      if(pendingCmd)applyCmd(pendingCmd);
      pendingCmd=null;addLog("Confirmed ✓","success");
      await speak("Done. Next.");restartListening();return;
    }
    if(lo.includes("no")||lo.includes("wrong")||lo.includes("cancel")){
      pendingCmd=null;addLog("Cancelled — say again","info");
      await speak("Cancelled. Say again.");restartListening();return;
    }
    await speak("Say confirm or no.");restartListening();return;
  }

  addLog('🗣 "'+text+'"',"info");
  const result=parseCmd(text);
  if(!result){addLog('Could not parse: "'+text+'"',"error");await speak("I didn't understand. Say the number, for, then the name.");restartListening();return}
  if(result.nameConfidence<90){
    pendingCmd=result;status="namePick";render();
    await speak("Not sure about the name. Tap the correct one.");return;
  }
  pendingCmd=result;status="confirm";render();
  const lb=result.type==="costco"?" costco":result.type==="lidoff"?" lid off":"";
  const msg=result.value+lb+" for "+result.name;
  addLog("→ "+msg,"info");
  await speak(msg+". Confirm?");
  restartListening();
}

function applyCmd(cmd){
  const p=data[cmd.name];if(!p)return;
  if(cmd.type==="normal"){if(p.normal.length>=MAX_N){addLog(cmd.name+": normal full","error");return}p.normal.push(cmd.value);lastHL={name:cmd.name,sec:"normal",idx:p.normal.length-1}}
  else if(cmd.type==="costco"){if(p.costco.length>=MAX_C){addLog(cmd.name+": costco full","error");return}p.costco.push(cmd.value);lastHL={name:cmd.name,sec:"costco",idx:p.costco.length-1}}
  else if(cmd.type==="lidoff"){if(p.lidoff.length>=MAX_L){addLog(cmd.name+": lidoff full","error");return}p.lidoff.push(cmd.value);lastHL={name:cmd.name,sec:"lidoff",idx:p.lidoff.length-1}}
  addLog("✓ "+cmd.value+" "+cmd.type+" → "+cmd.name+" (total: "+totalFor(p)+")","success");
  render();setTimeout(()=>{lastHL=null;render()},2500);
}

// ── Actions ──
async function startSession(){sessionActive=true;status="listening";addLog("Session started","success");render();await speak("Ready.");startListening()}
async function endSession(){sessionActive=false;try{rec?.abort()}catch{}status="idle";pendingCmd=null;transcript="";addLog("Session ended","info");render();await speak("Session ended.")}

function pickName(name){
  if(!pendingCmd)return;
  pendingCmd={...pendingCmd,name,nameConfidence:100};status="confirm";render();
  const lb=pendingCmd.type==="costco"?" costco":pendingCmd.type==="lidoff"?" lid off":"";
  const msg=pendingCmd.value+lb+" for "+name;
  addLog("Selected: "+name,"info");
  speak(msg+". Confirm?").then(()=>restartListening());
}

function handleUndo(){
  const last=[...logs].reverse().find(l=>l.msg.startsWith("✓")&&l.msg.includes("→"));
  if(!last)return;const m=last.msg.match(/✓ (\d+) (\w+) → (.+?) \(/);if(!m)return;
  const[,,type,name]=m;const p=data[name];if(!p)return;
  if(type==="normal")p.normal.pop();else if(type==="costco")p.costco.pop();else if(type==="lidoff")p.lidoff.pop();
  addLog("↩ Undo: "+name+" "+type,"info");render();
}

function downloadCSV(){
  const esc=v=>{const s=String(v??"");return s.includes(",")||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s};
  const rows=[];
  const h1=["Name"];for(let i=0;i<MAX_N;i++)h1.push(i===0?"Normal Trays":"");
  for(let i=0;i<MAX_C*2;i++)h1.push(i===0?"Costco (x14/12)":"");
  for(let i=0;i<MAX_L*2;i++)h1.push(i===0?"LidOff (x13/17)":"");h1.push("Total");
  rows.push(h1.map(esc).join(","));
  const h2=[""];for(let i=1;i<=MAX_N;i++)h2.push(i);
  for(let i=1;i<=MAX_C;i++){h2.push("Costco"+i);h2.push("Convert"+i)}
  for(let i=1;i<=MAX_L;i++){h2.push("LidOff"+i);h2.push("Convert"+i)}h2.push("");
  rows.push(h2.map(esc).join(","));
  NAMES.forEach(name=>{const p=data[name];const row=[name];
    for(let i=0;i<MAX_N;i++)row.push(p.normal[i]??"");
    for(let i=0;i<MAX_C;i++){row.push(p.costco[i]??"");row.push(p.costco[i]!=null?cConv(p.costco[i]):"")};
    for(let i=0;i<MAX_L;i++){row.push(p.lidoff[i]??"");row.push(p.lidoff[i]!=null?lConv(p.lidoff[i]):"")};
    row.push(totalFor(p));rows.push(row.map(esc).join(","))});
  const blob=new Blob([rows.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tray-tally.csv";a.click();
  addLog("Downloaded CSV","success");
}

function setTab(t){viewTab=t;render()}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  const sc={idle:"#3b4a64",listening:"#4ade80",confirm:"#fbbf24",namePick:"#a78bfa"}[status];
  const sl={idle:"Tap COPY to start",listening:"● Listening…",confirm:'Say "Confirm" or "No"',namePick:"Tap the correct name"}[status];

  let html=`
  <div class="header">
    <h1>${sessionActive?'<span class="rec-dot"></span>':''}🧮 Tray Tally</h1>
    <div style="display:flex;gap:6px">
      ${sessionActive?'<button class="chip" onclick="handleUndo()">↩</button>':''}
      <button class="chip" onclick="downloadCSV()">⬇ csv</button>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot" style="background:${sc};${status==="listening"?"box-shadow:0 0 8px #4ade80":""}"></div>
    <span style="font-size:12px;font-weight:600;color:${sc}">${sl}</span>
  </div>
  <div class="tabs">
    <button class="tab ${viewTab==="table"?"active":""}" onclick="setTab('table')">📊 Table</button>
    <button class="tab ${viewTab==="log"?"active":""}" onclick="setTab('log')">📋 Log (${logs.length})</button>
  </div>
  <div class="content">`;

  if(viewTab==="table"){
    html+=`<div class="table-wrap"><table><thead><tr>
      <th class="big" rowspan="2" style="position:sticky;left:0;z-index:5;min-width:68px;background:var(--surface)">Name</th>
      <th class="big" colspan="${MAX_N}" style="color:var(--accent);text-align:center;border-left:2px solid rgba(56,189,248,0.13)">Normal</th>
      <th class="big" colspan="6" style="color:var(--orange);text-align:center;border-left:2px solid rgba(251,191,36,0.13)">Costco</th>
      <th class="big" colspan="6" style="color:var(--purple);text-align:center;border-left:2px solid rgba(167,139,250,0.13)">LidOff</th>
      <th class="big" rowspan="2" style="color:var(--green);text-align:center;border-left:2px solid rgba(74,222,128,0.13)">Tot</th>
    </tr><tr>`;
    for(let i=1;i<=MAX_N;i++)html+=`<th class="sub" ${i===1?'style="border-left:2px solid rgba(56,189,248,0.13)"':''}>${i}</th>`;
    for(let i=1;i<=3;i++)html+=`<th class="sub" style="color:var(--orange);${i===1?'border-left:2px solid rgba(251,191,36,0.13)':''}">C${i}</th><th class="sub" style="color:rgba(251,191,36,0.4)">cv</th>`;
    for(let i=1;i<=3;i++)html+=`<th class="sub" style="color:var(--purple);${i===1?'border-left:2px solid rgba(167,139,250,0.13)':''}">L${i}</th><th class="sub" style="color:rgba(167,139,250,0.4)">cv</th>`;
    html+=`</tr></thead><tbody>`;

    NAMES.forEach((name,ri)=>{
      const p=data[name];const tot=totalFor(p);const active=p.normal.length+p.costco.length+p.lidoff.length>0;
      const bg=ri%2===0?"var(--bg)":"var(--card)";
      html+=`<tr style="background:${ri%2===0?"transparent":"rgba(20,28,43,0.27)"}">`;
      html+=`<td class="name" style="background:${bg};color:${active?"var(--text)":"var(--dim)"}">${name}</td>`;
      for(let ci=0;ci<MAX_N;ci++){const v=p.normal[ci];const hl=lastHL&&lastHL.name===name&&lastHL.sec==="normal"&&lastHL.idx===ci;
        html+=`<td class="cell${hl?" hl":""}" style="${ci===0?"border-left:2px solid rgba(56,189,248,0.13)":""}">${v??""}</td>`}
      for(let ci=0;ci<3;ci++){const v=p.costco[ci];const cv=v!=null?cConv(v):null;const hl=lastHL&&lastHL.name===name&&lastHL.sec==="costco"&&lastHL.idx===ci;
        html+=`<td class="cell${hl?" hl-c":""}" style="${ci===0?"border-left:2px solid rgba(251,191,36,0.13)":""}${v!=null?";color:var(--orange)":""}">${v??""}</td>`;
        html+=`<td class="cell" style="color:${cv!=null?"rgba(251,191,36,0.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`}
      for(let ci=0;ci<3;ci++){const v=p.lidoff[ci];const cv=v!=null?lConv(v):null;const hl=lastHL&&lastHL.name===name&&lastHL.sec==="lidoff"&&lastHL.idx===ci;
        html+=`<td class="cell${hl?" hl-l":""}" style="${ci===0?"border-left:2px solid rgba(167,139,250,0.13)":""}${v!=null?";color:var(--purple)":""}">${v??""}</td>`;
        html+=`<td class="cell" style="color:${cv!=null?"rgba(167,139,250,0.47)":"var(--dim)"};font-style:italic;font-size:9px">${cv??""}</td>`}
      html+=`<td class="cell" style="font-weight:700;font-size:12px;color:${tot>0?"var(--green)":"var(--dim)"};border-left:2px solid rgba(74,222,128,0.13);font-family:'Outfit'">${tot}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  } else {
    html+=`<div class="log-wrap">`;
    if(logs.length===0)html+=`<p style="font-size:12px;color:var(--dim)">No activity yet.</p>`;
    logs.forEach(l=>{
      html+=`<div class="log-entry ${l.type}"><span class="log-time">${l.t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>${l.msg}</div>`;
    });
    html+=`<div id="logsEnd"></div></div>`;
  }

  html+=`</div><div class="bottom">`;
  if(transcript)html+=`<div class="transcript"><p>🗣 "${transcript}"</p></div>`;
  if(status==="confirm"&&pendingCmd){
    const tc=pendingCmd.type==="costco"?"var(--orange)":pendingCmd.type==="lidoff"?"var(--purple)":"var(--accent)";
    html+=`<div class="confirm-box"><span class="confirm-val"><span style="color:${tc}">${pendingCmd.value}</span>`;
    if(pendingCmd.type!=="normal")html+=`<span style="color:${tc};font-size:15px"> ${pendingCmd.type}</span>`;
    html+=`<span style="color:var(--muted);font-size:15px"> for </span><span>${pendingCmd.name}</span></span>`;
    html+=`<p class="confirm-hint">Say "Confirm" or "No"</p></div>`;
  }
  if(status==="namePick"&&pendingCmd){
    html+=`<div class="name-picker"><p class="name-picker-title">${pendingCmd.value} ${pendingCmd.type!=="normal"?pendingCmd.type:""} — for who?</p><div class="name-grid">`;
    NAMES.forEach(n=>{html+=`<button class="name-btn" onclick="pickName('${n}')">${n}</button>`});
    html+=`</div><button class="cancel-btn" onclick="pendingCmd=null;status='listening';render();restartListening()">✗ Cancel</button></div>`;
  }
  html+=`<div class="main-btn-wrap">`;
  if(!sessionActive){
    html+=`<button class="btn-copy" onclick="startSession()"><span style="font-size:30px">🎤</span> COPY</button>`;
  }else{
    html+=`<button class="btn-done" onclick="endSession()">■ DONE</button>`;
  }
  html+=`</div>`;
  if(!sessionActive)html+=`<p class="hint"><span style="color:var(--accent)">[number] for [name]</span> · <span style="color:var(--orange)">[number] costco for [name]</span> · <span style="color:var(--purple)">[number] lidoff for [name]</span></p>`;
  html+=`</div>`;

  app.innerHTML=html;
  const le=document.getElementById("logsEnd");if(le)le.scrollIntoView({behavior:"smooth"});
}

// ── Init ──
render();
</script>
</body>
</html>
